<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content CRM — ItsCrear</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
:root {
  --brand: #7C3AED; --brand-light: #EDE9FE; --brand-dark: #5B21B6;
  --success: #10B981; --danger: #EF4444; --accent: #F59E0B;
  --gray-50: #F9FAFB; --gray-100: #F3F4F6; --gray-200: #E5E7EB;
  --gray-300: #D1D5DB; --gray-500: #6B7280; --gray-700: #374151; --gray-900: #111827;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--gray-50); color: var(--gray-900); }

/* AUTH */
#auth-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,var(--brand-dark),var(--brand)); }
.auth-card { background:white; border-radius:16px; padding:40px; width:100%; max-width:400px; box-shadow:0 20px 60px rgba(0,0,0,.2); }
.auth-logo { text-align:center; margin-bottom:32px; }
.auth-logo h1 { font-size:28px; font-weight:800; color:var(--brand); }
.auth-logo p { color:var(--gray-500); font-size:14px; margin-top:4px; }

/* FORMS */
.fg { margin-bottom:16px; }
.fg label { display:block; font-size:13px; font-weight:600; color:var(--gray-700); margin-bottom:6px; }
.fg input, .fg select, .fg textarea {
  width:100%; padding:10px 14px; border:1.5px solid var(--gray-200);
  border-radius:8px; font-size:14px; background:white; color:var(--gray-900); transition:border-color .2s;
}
.fg input:focus, .fg select:focus { outline:none; border-color:var(--brand); }
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

/* BUTTONS */
.btn { display:inline-flex; align-items:center; gap:8px; padding:10px 20px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; border:none; transition:all .2s; }
.btn-p { background:var(--brand); color:white; } .btn-p:hover { background:var(--brand-dark); }
.btn-s { background:var(--gray-100); color:var(--gray-700); } .btn-s:hover { background:var(--gray-200); }
.btn-d { background:var(--danger); color:white; }
.btn-full { width:100%; justify-content:center; }
.btn-sm { padding:6px 12px; font-size:13px; }
.btn:disabled { opacity:.6; cursor:not-allowed; }
.err { background:#FEE2E2; color:#B91C1C; padding:10px 14px; border-radius:8px; font-size:13px; margin-top:12px; }

/* APP */
#app { display:none; min-height:100vh; }
.topbar { background:white; border-bottom:1px solid var(--gray-200); padding:0 24px; height:60px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.topbar-brand { font-size:18px; font-weight:800; color:var(--brand); }
.user-badge { display:flex; align-items:center; gap:8px; background:var(--brand-light); padding:6px 12px; border-radius:20px; font-size:13px; font-weight:600; color:var(--brand); }
.role-badge { font-size:11px; padding:2px 8px; border-radius:10px; font-weight:700; background:var(--brand); color:white; }
.wrap { max-width:1200px; margin:0 auto; padding:24px; }

/* ALERTS */
.alert-box { background:#FEF3C7; border:1px solid #FCD34D; border-radius:10px; padding:14px 18px; margin-bottom:20px; }
.alert-box h3 { font-size:14px; font-weight:700; color:#92400E; margin-bottom:8px; }
.alert-item { font-size:13px; color:#78350F; padding:3px 0; }

/* CLIENTS */
.section-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.section-title { font-size:20px; font-weight:700; }
.clients-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
.client-card { background:white; border-radius:12px; border:1.5px solid var(--gray-200); padding:20px; cursor:pointer; transition:all .2s; }
.client-card:hover { border-color:var(--brand); box-shadow:0 4px 20px rgba(124,58,237,.1); transform:translateY(-2px); }
.client-name { font-size:16px; font-weight:700; margin-bottom:6px; }
.client-meta { font-size:13px; color:var(--gray-500); }
.dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:6px; }
.dot-on { background:var(--success); } .dot-off { background:var(--gray-300); }
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700; background:var(--brand-light); color:var(--brand); margin-top:8px; margin-right:4px; }
.badge-green { background:#D1FAE5; color:#065F46; }

/* DETAIL */
#client-detail { display:none; }
.back { display:flex; align-items:center; gap:6px; color:var(--gray-500); font-size:14px; cursor:pointer; margin-bottom:20px; }
.back:hover { color:var(--brand); }
.client-hdr { background:white; border-radius:12px; padding:24px; margin-bottom:20px; border:1.5px solid var(--gray-200); display:flex; align-items:flex-start; justify-content:space-between; }
.client-hdr-info h2 { font-size:24px; font-weight:800; }
.client-hdr-info p { color:var(--gray-500); font-size:14px; margin-top:4px; }
.client-hdr-actions { display:flex; gap:8px; }

/* TABS */
.tabs { display:flex; gap:4px; background:var(--gray-100); padding:4px; border-radius:10px; margin-bottom:20px; flex-wrap:wrap; }
.tab { padding:8px 16px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; color:var(--gray-500); border:none; background:transparent; transition:all .2s; }
.tab.active { background:white; color:var(--brand); box-shadow:0 1px 4px rgba(0,0,0,.1); }
.tab-content { display:none; }
.tab-content.active { display:block; }

/* KPIs */
.kpi-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; margin-bottom:24px; }
.kpi { background:white; border-radius:10px; padding:16px; border:1.5px solid var(--gray-200); }
.kpi-label { font-size:12px; color:var(--gray-500); font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
.kpi-value { font-size:26px; font-weight:800; color:var(--brand); margin-top:4px; }
.kpi-trend { font-size:12px; font-weight:700; margin-top:4px; }
.up { color:var(--success); } .down { color:var(--danger); }

/* TABLES */
.tbl-wrap { background:white; border-radius:12px; border:1.5px solid var(--gray-200); overflow:hidden; margin-bottom:20px; }
table { width:100%; border-collapse:collapse; }
th { background:var(--gray-50); padding:12px 16px; text-align:left; font-size:12px; font-weight:700; color:var(--gray-500); text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--gray-200); }
td { padding:12px 16px; font-size:14px; border-bottom:1px solid var(--gray-100); vertical-align:middle; }
tr:last-child td { border-bottom:none; }
tr:hover td { background:var(--gray-50); }
.lnk a { color:var(--brand); text-decoration:none; font-weight:600; }
.lnk a:hover { text-decoration:underline; }

/* CHART */
.chart-box { background:white; border-radius:12px; border:1.5px solid var(--gray-200); padding:20px; margin-bottom:20px; }
.chart-title { font-size:15px; font-weight:700; margin-bottom:16px; }

/* CARD */
.card { background:white; border-radius:12px; border:1.5px solid var(--gray-200); padding:20px; margin-bottom:16px; }
.card h3 { font-size:16px; font-weight:700; margin-bottom:16px; }

/* MODAL */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:1000; align-items:center; justify-content:center; }
.overlay.open { display:flex; }
.modal { background:white; border-radius:16px; padding:32px; width:100%; max-width:560px; max-height:90vh; overflow-y:auto; position:relative; }
.modal-title { font-size:20px; font-weight:800; margin-bottom:24px; }
.modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:24px; }
.close-btn { position:absolute; top:16px; right:16px; cursor:pointer; color:var(--gray-500); font-size:20px; border:none; background:none; }

/* UPLOAD */
.upload-zone { border:2px dashed var(--gray-300); border-radius:10px; padding:40px; text-align:center; cursor:pointer; transition:all .2s; }
.upload-zone:hover { border-color:var(--brand); background:var(--brand-light); }
.upload-zone .icon { font-size:40px; margin-bottom:8px; }
.upload-zone p { color:var(--gray-500); font-size:14px; margin-top:4px; }
.preview-box { background:var(--gray-50); border-radius:8px; padding:16px; margin-top:16px; }
.preview-box h4 { font-size:14px; font-weight:700; margin-bottom:12px; }
.stat-chip { display:inline-block; background:white; border:1px solid var(--gray-200); border-radius:8px; padding:8px 14px; font-size:13px; font-weight:600; margin:4px; }
.stat-chip span { color:var(--brand); font-size:18px; display:block; }

/* PERIOD CHIPS */
.period-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
.pchip { padding:6px 14px; border-radius:20px; font-size:13px; font-weight:600; cursor:pointer; background:var(--gray-100); color:var(--gray-700); border:none; transition:all .2s; }
.pchip.active { background:var(--brand); color:white; }

/* AI */
.ai-center { text-align:center; padding:48px 24px; }
.ai-center h3 { font-size:20px; font-weight:700; margin-bottom:8px; }
.ai-center p { color:var(--gray-500); font-size:14px; margin-bottom:24px; line-height:1.6; }
/* IA legacy */
.ai-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; margin-top:16px; }
.ai-card { background:white; border-radius:12px; border:1.5px solid var(--gray-200); padding:20px; }
.ai-card-title { font-size:15px; font-weight:700; margin-bottom:12px; }
.ai-card p { font-size:13px; color:var(--gray-700); line-height:1.6; }
.ai-summary { background:var(--brand-light); border-radius:12px; padding:20px; margin-bottom:20px; }
.ai-summary p { font-size:14px; color:var(--brand-dark); line-height:1.7; }
.tag { display:inline-block; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:600; margin:2px; }
.tag-g { background:#D1FAE5; color:#065F46; } .tag-r { background:#FEE2E2; color:#991B1B; }
.tag-b { background:#DBEAFE; color:#1E40AF; } .tag-y { background:#FEF3C7; color:#92400E; }
.script-list { display:flex; flex-direction:column; gap:12px; margin-top:16px; }
.script-item { background:white; border:1.5px solid var(--gray-200); border-radius:10px; padding:14px; }
.script-item h4 { font-size:14px; font-weight:700; margin-bottom:4px; }
/* IA nuevo diseño */
.ia-section { background:white; border-radius:14px; border:1.5px solid var(--gray-200); padding:24px; margin-bottom:16px; }
.ia-section-hdr { display:flex; align-items:center; gap:10px; margin-bottom:20px; border-bottom:1px solid var(--gray-100); padding-bottom:14px; }
.ia-section-hdr h3 { font-size:16px; font-weight:700; margin:0; }
.ia-section-hdr span { font-size:12px; color:var(--gray-500); }
.ia-item { border-left:3px solid var(--gray-200); padding:10px 14px; margin-bottom:10px; border-radius:0 8px 8px 0; }
.ia-item-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--gray-500); margin-bottom:3px; }
.ia-item-quote { font-size:13px; font-style:italic; color:#374151; }
.ia-item-note { font-size:12px; color:#059669; margin-top:3px; }
.ia-highlight { border-radius:10px; padding:14px 18px; margin-top:10px; }
.ia-highlight-green { background:#ECFDF5; border:1px solid #A7F3D0; }
.ia-highlight-blue { background:#EFF6FF; border:1px solid #BFDBFE; }
.ia-highlight-yellow { background:#FFFBEB; border:1px solid #FDE68A; }
.ia-highlight-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px; }
.ia-highlight-green .ia-highlight-label { color:#059669; }
.ia-highlight-blue .ia-highlight-label { color:#2563EB; }
.ia-highlight-yellow .ia-highlight-label { color:#D97706; }
.ia-highlight-text { font-size:13px; line-height:1.6; color:#111827; }
.ia-proximo { border-radius:10px; padding:16px; margin-bottom:10px; }
.ia-proximo-replicar { background:#F5F3FF; border:1.5px solid #DDD6FE; }
.ia-proximo-probar { background:#FFF7ED; border:1.5px solid #FED7AA; }
.ia-proximo-tipo { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.08em; margin-bottom:8px; }
.ia-proximo-replicar .ia-proximo-tipo { color:#7C3AED; }
.ia-proximo-probar .ia-proximo-tipo { color:#EA580C; }
.ia-proximo h4 { font-size:14px; font-weight:700; margin:0 0 10px; }
.ia-proximo-hook { background:white; border-radius:6px; padding:8px 12px; font-size:13px; font-style:italic; border:1px solid rgba(0,0,0,.06); margin:8px 0; }
.ia-proximo-razon { font-size:12px; color:#6B7280; margin-top:6px; }
.guion-card { background:#FAFAFA; border:1px solid var(--gray-200); border-radius:10px; margin-bottom:12px; overflow:hidden; }
.guion-card-hdr { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; cursor:pointer; }
.guion-card-hdr:hover { background:#F3F4F6; }
.guion-card-body { padding:0 16px 14px; display:none; white-space:pre-wrap; font-size:12px; color:#374151; line-height:1.7; font-family:monospace; }
.guion-card-body.open { display:block; }
.pb-wrap { background:var(--gray-200); border-radius:10px; height:6px; margin:8px 0; }
.pb { background:var(--brand); height:6px; border-radius:10px; transition:width .4s; }
.spinner { display:inline-block; width:18px; height:18px; border:3px solid rgba(255,255,255,.3); border-top-color:white; border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* MISC */
.empty { text-align:center; padding:48px 24px; color:var(--gray-500); }
.empty h3 { font-size:16px; font-weight:600; margin-bottom:8px; color:var(--gray-700); }
.loading { text-align:center; padding:32px; color:var(--gray-500); }
.star-btn { background:none; border:none; cursor:pointer; font-size:20px; transition:transform .2s; }
.star-btn:hover { transform:scale(1.2); }
.text-sm { font-size:13px; } .text-muted { color:var(--gray-500); }
.mt8 { margin-top:8px; } .mt16 { margin-top:16px; }
.flex-row { display:flex; align-items:center; gap:8px; }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo"><h1>✦ ItsCrear</h1><p>Content CRM — Acceso de equipo</p></div>
    <div class="fg"><label>Email</label><input type="email" id="a-email" placeholder="tu@email.com"></div>
    <div class="fg"><label>Contraseña</label><input type="password" id="a-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"></div>
    <button class="btn btn-p btn-full" onclick="login()">Iniciar sesión</button>
    <div id="a-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">✦ ItsCrear CRM</div>
    <div class="flex-row">
      <div class="user-badge"><span id="u-email"></span><span class="role-badge" id="u-role"></span></div>
      <button class="btn btn-s btn-sm" onclick="logout()">Salir</button>
    </div>
  </div>
  <div class="wrap">
    <div id="alerts-box"></div>

    <!-- DASHBOARD -->
    <div id="dashboard">
      <div class="section-hdr">
        <h2 class="section-title">Clientes</h2>
        <button class="btn btn-p" id="btn-add-client" onclick="openAddClient()" style="display:none">+ Nuevo cliente</button>
      </div>
      <div class="clients-grid" id="clients-grid"><div class="loading">Cargando...</div></div>
    </div>

    <!-- CLIENT DETAIL -->
    <div id="client-detail">
      <div class="back" onclick="showDashboard()">← Volver a clientes</div>
      <div class="client-hdr">
        <div class="client-hdr-info">
          <h2 id="d-name"></h2>
          <p id="d-meta"></p>
        </div>
        <div class="client-hdr-actions" id="d-actions"></div>
      </div>
      <div class="tabs" id="tabs-bar">
        <button class="tab active" onclick="switchTab('resumen')">📊 Resumen</button>
        <button class="tab" onclick="switchTab('historial')">📅 Historial</button>
        <button class="tab" onclick="switchTab('publicaciones')">📱 Publicaciones</button>
        <button class="tab" onclick="switchTab('estrellas')">⭐ Estrellas</button>
        <button class="tab" onclick="switchTab('ia')" id="btn-ia" style="display:none">✨ Análisis IA</button>
        <button class="tab" onclick="switchTab('cargar')">+ Cargar métricas</button>
      </div>
      <div class="tab-content active" id="tab-resumen"><div id="c-resumen"></div></div>
      <div class="tab-content" id="tab-historial"><div id="c-historial"></div></div>
      <div class="tab-content" id="tab-publicaciones"><div id="c-publicaciones"></div></div>
      <div class="tab-content" id="tab-estrellas"><div id="c-estrellas"></div></div>
      <div class="tab-content" id="tab-ia"><div id="c-ia"></div></div>
      <div class="tab-content" id="tab-cargar"><div id="c-cargar"></div></div>
    </div>
  </div>
</div>

<!-- MODAL CLIENTE -->
<div class="overlay" id="modal-client">
  <div class="modal">
    <button class="close-btn" onclick="closeModal('modal-client')">✕</button>
    <div class="modal-title" id="mc-title">Nuevo cliente</div>
    <div class="grid2">
      <div class="fg"><label>Nombre *</label><input type="text" id="mc-name"></div>
      <div class="fg"><label>Nicho</label><input type="text" id="mc-niche" placeholder="Ej: Fitness"></div>
    </div>
    <div class="grid2">
      <div class="fg" style="display:none"><label>_</label><input type="text" id="mc-handle"></div>
      <div class="fg"><label>Piezas por mes</label>
        <select id="mc-pieces">
          <option value="15">15 / mes</option>
          <option value="20">20 / mes</option>
          <option value="30">30 / mes (quincenal)</option>
        </select>
      </div>
    </div>
    <div class="grid2">
      <div class="fg"><label>Fecha inicio</label><input type="date" id="mc-start"></div>
      <div class="fg"><label>Estado</label>
        <select id="mc-active"><option value="true">Activo</option><option value="false">Inactivo</option></select>
      </div>
    </div>
    <div class="fg">
      <label>Notion Database ID <span class="text-muted">(para análisis IA)</span></label>
      <input type="text" id="mc-notion" placeholder="29d5c1f273f281ebb8a0dee3dc5d6b81">
      <div class="text-sm text-muted mt8">Lo encontrás en la URL de tu base de datos de Notion</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-s" onclick="closeModal('modal-client')">Cancelar</button>
      <button class="btn btn-p" onclick="saveClient()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL CONFIRMAR -->
<div class="overlay" id="modal-confirm">
  <div class="modal" style="max-width:400px">
    <div class="modal-title">¿Estás segura?</div>
    <p class="text-sm" id="confirm-msg"></p>
    <div class="modal-actions">
      <button class="btn btn-s" onclick="closeModal('modal-confirm')">Cancelar</button>
      <button class="btn btn-d" id="confirm-btn">Eliminar</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// CONFIG — credenciales
// ═══════════════════════════════════════════
const SB_URL  = 'https://qpvgvzjgcwosjwnblydz.supabase.co';
const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwdmd2empnY3dvc2p3bmJseWR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNjI3NDIsImV4cCI6MjA4OTYzODc0Mn0.bBqUQV9OqF5-OwDyc_5agn3MMkYjUpWXa_i7hKaR5kY';
const EDGE_FN = `${SB_URL}/functions/v1/quick-processor`;

const { createClient } = supabase;
const db = createClient(SB_URL, SB_KEY);

// ═══════════════════════════════════════════
// ESTADO GLOBAL
// ═══════════════════════════════════════════
let user = null, role = null, client = null;
let clients = [], periods = [], selPeriod = null, editId = null;
let chartInst = null, csvData = null;
let NOTION = null, CLAUDE = null; // se cargan desde Supabase después del login

// ═══════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════
async function login() {
  const email = document.getElementById('a-email').value.trim();
  const pass  = document.getElementById('a-pass').value;
  const errEl = document.getElementById('a-err');
  errEl.innerHTML = '';
  const { data, error } = await db.auth.signInWithPassword({ email, password: pass });
  if (error) { errEl.innerHTML = `<div class="err">${error.message}</div>`; return; }
  await boot(data.user);
}

async function logout() { await db.auth.signOut(); location.reload(); }

async function boot(u) {
  user = u;
  const { data: p } = await db.from('profiles').select('role').eq('id', u.id).single();
  role = p?.role || 'editor';

  // Cargar tokens desde Supabase (nunca en el código)
  const { data: settings } = await db.from('settings').select('key, value');
  (settings || []).forEach(s => {
    if (s.key === 'notion_token') NOTION = s.value;
    if (s.key === 'claude_key')   CLAUDE = s.value;
  });

  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';

async function loadClients() {

function renderGrid() {

    el.innerHTML = '<div class="empty"><h3>No hay clientes</h3><p>Hacé clic en "+ Nuevo cliente" para empezar</p></div>';

async function openClient(id) {
  client = clients.find(c => c.id === id);
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('client-detail').style.display = 'block';
  document.getElementById('alerts-box').style.display = 'none';
  document.getElementById('d-name').textContent = client.name;
  document.getElementById('d-meta').textContent =
    [client.niche, `${client.pieces_per_month} piezas/mes`, `Desde ${fmtDate(client.start_date)}`].filter(Boolean).join(' · ');

    (role === 'admin'
      ? `<button class="btn btn-s btn-sm" onclick="openEditClient()">✏️ Editar</button>

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));

  document.getElementById('tab-resumen').classList.add('active');
  await loadPeriods();
  renderResumen();
}

function showDashboard() {
  document.getElementById('client-detail').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('alerts-box').style.display = 'block';

// CLIENT CRUD
// ═══════════════════════════════════════════
function openAddClient() {
  editId = null;
  document.getElementById('mc-title').textContent = 'Nuevo cliente';
  ['mc-name','mc-handle','mc-niche','mc-notion'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('mc-pieces').value = '15';
  document.getElementById('mc-active').value = 'true';
  document.getElementById('mc-start').value = new Date().toISOString().split('T')[0];
  openModal('modal-client');
}

function openEditClient() {
  editId = client.id;
  document.getElementById('mc-title').textContent = 'Editar cliente';
  document.getElementById('mc-name').value = client.name || '';
  document.getElementById('mc-handle').value = client.handle || '';
  document.getElementById('mc-niche').value = client.niche || '';
  document.getElementById('mc-pieces').value = client.pieces_per_month || 15;
  document.getElementById('mc-active').value = client.active ? 'true' : 'false';
  document.getElementById('mc-start').value = client.start_date || '';
  document.getElementById('mc-notion').value = client.notion_database_id || '';
  openModal('modal-client');
}

async function saveClient() {
  const name       = document.getElementById('mc-name').value.trim();
  const niche      = document.getElementById('mc-niche').value.trim() || null;
  const pieces     = parseInt(document.getElementById('mc-pieces').value);
  const active     = document.getElementById('mc-active').value === 'true';
  const start_date = document.getElementById('mc-start').value || new Date().toISOString().split('T')[0];
  const notion_database_id = document.getElementById('mc-notion').value.trim() || null;

  if (!name) { alert('El nombre es obligatorio'); return; }

  const payload = { name, niche, pieces_per_month: pieces, active, start_date, notion_database_id };
  console.log('[saveClient] payload:', JSON.stringify(payload));

  let err;
  if (editId) {
    ({ error: err } = await db.from('clients').update(payload).eq('id', editId));
    if (!err) {
      client = { ...client, ...payload };
      document.getElementById('d-name').textContent = client.name;
      document.getElementById('d-meta').textContent = [client.niche, `${client.pieces_per_month} piezas/mes`, `Desde ${fmtDate(client.start_date)}`].filter(Boolean).join(' · ');
      document.getElementById('btn-ia').style.display = client.notion_database_id ? 'block' : 'none';
    }
  } else {
    ({ error: err } = await db.from('clients').insert(payload));
  }
  if (err) {
    console.error('[saveClient] Error:', err);
    alert(`Error guardando cliente:\n${err.message}\n\nCódigo: ${err.code}\nDetalles: ${err.details || '—'}\nHint: ${err.hint || '—'}`);
    return;
  }
  closeModal('modal-client');
  await loadClients();
}

function confirmDel() {
  document.getElementById('confirm-msg').textContent = `¿Eliminar a ${client.name}? Se borrarán todos sus períodos y publicaciones.`;
  document.getElementById('confirm-btn').onclick = async () => {
    await db.from('clients').delete().eq('id', client.id);
    closeModal('modal-confirm'); showDashboard(); await loadClients();
  };
  openModal('modal-confirm');
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => {
    if (t.getAttribute('onclick') === `switchTab('${name}')`) t.classList.add('active');
  });
  document.getElementById(`tab-${name}`).classList.add('active');
  if (name === 'resumen')      renderResumen();
  if (name === 'historial')    renderHistorial();

async function renderResumen() {
  const el = document.getElementById('c-resumen');
  if (!periods.length) {
    el.innerHTML = '<div class="empty"><h3>Sin métricas todavía</h3><p>Usá el tab "+ Cargar métricas" para subir el CSV de Meta Business Suite.</p></div>';
    return;
  }
  const last = periods[0];
  const prev = periods[1];
  const { data: posts } = await db.from('posts').select('*').eq('period_id', last.id).order('likes', { ascending: false });

  const tr = (a, b) => {
    if (!b || b === 0) return '';
    const d = ((a - b) / b * 100).toFixed(1);
    return d > 0 ? `<div class="kpi-trend up">▲ ${d}%</div>` : `<div class="kpi-trend down">▼ ${Math.abs(d)}%</div>`;
  };

  el.innerHTML = `
    <div class="text-sm text-muted" style="margin-bottom:12px">Período: <strong>${last.period_label}</strong> · ${posts?.length||0} publicaciones</div>
    <div class="kpi-grid">
      ${K('Alcance', last.total_reach, tr(last.total_reach, prev?.total_reach))}
      ${K('Visualizaciones', last.total_views, tr(last.total_views, prev?.total_views))}
      ${K('Me gusta', last.total_likes, tr(last.total_likes, prev?.total_likes))}
      ${K('Guardados', last.total_saves, tr(last.total_saves, prev?.total_saves))}
      ${K('Compartidos', last.total_shares, tr(last.total_shares, prev?.total_shares))}
      ${K('Comentarios', last.total_comments, tr(last.total_comments, prev?.total_comments))}
      ${K('Seguimientos', last.total_follows, tr(last.total_follows, prev?.total_follows))}
      ${K('Piezas', last.total_posts, '')}
    </div>
    ${posts?.length ? topPosts(posts.slice(0,5)) : ''}`;
}

function K(label, val, trend='') {
  return `<div class="kpi"><div class="kpi-label">${label}</div><div class="kpi-value">${N(val)}</div>${trend}</div>`;
}
function topPosts(posts) {
  return `<div class="chart-box"><div class="chart-title">🏆 Top publicaciones</div>
    <div class="tbl-wrap"><table><thead><tr><th>#</th><th>Descripción</th><th>Tipo</th><th>Visualiz.</th><th>Guardados</th><th>Comentarios</th><th>Alcance</th><th>Link</th></tr></thead>
    <tbody>${posts.map((p,i)=>`<tr>
      <td>${i+1}</td>
      <td>${(p.description||'—').slice(0,55)}${p.description?.length>55?'…':''}</td>
      <td>${fmtTipo(p.post_type, true)}</td>
      <td>${N(p.views)}</td><td>${N(p.saves)}</td><td>${N(p.comments)}</td><td>${N(p.reach)}</td>
      <td class="lnk">${p.link?`<a href="${p.link}" target="_blank">Ver →</a>`:'—'}</td>
    </tr>`).join('')}</tbody></table></div></div>`;
}

async function renderHistorial() {
  const el = document.getElementById('c-historial');
  if (!periods.length) { el.innerHTML = '<div class="empty"><h3>Sin historial</h3></div>'; return; }
  const rev = [...periods].reverse();
  el.innerHTML = `
    <div class="chart-box"><div class="chart-title">Evolución de métricas</div><canvas id="ev-chart" height="80"></canvas></div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Período</th><th>Alcance</th><th>Visualizaciones</th><th>Me gusta</th><th>Guardados</th><th>Compartidos</th><th>Seguimientos</th>${role==='admin'?'<th></th>':''}</tr></thead>
      <tbody>${periods.map(p=>`<tr>
        <td><strong>${p.period_label}</strong></td>
        <td>${N(p.total_reach)}</td><td>${N(p.total_views)}</td><td>${N(p.total_likes)}</td>
        <td>${N(p.total_saves)}</td><td>${N(p.total_shares)}</td><td>${N(p.total_follows)}</td>
        ${role==='admin'?`<td><button class="btn btn-s btn-sm" onclick="delPeriod('${p.id}','${p.period_label}')">🗑️</button></td>`:''}
      </tr>`).join('')}</tbody>
    </table></div>`;
  if (chartInst) chartInst.destroy();
  const ctx = document.getElementById('ev-chart').getContext('2d');
  chartInst = new Chart(ctx, { type:'line', data:{
    labels: rev.map(p=>p.period_label),
    datasets:[
      {label:'Alcance', data:rev.map(p=>p.total_reach||0), borderColor:'#7C3AED', tension:.4, fill:false},
      {label:'Likes', data:rev.map(p=>p.total_likes||0), borderColor:'#10B981', tension:.4, fill:false},
      {label:'Guardados', data:rev.map(p=>p.total_saves||0), borderColor:'#F59E0B', tension:.4, fill:false},
    ]
  }, options:{responsive:true, plugins:{legend:{position:'top'}}} });
}

function delPeriod(id, label) {
  document.getElementById('confirm-msg').textContent = `¿Eliminar el período "${label}" y todas sus publicaciones?`;
  document.getElementById('confirm-btn').onclick = async () => {
    await db.from('posts').delete().eq('period_id', id);
    await db.from('metric_periods').delete().eq('id', id);
    // Si el período eliminado era el seleccionado en Publicaciones, resetear
    if (selPeriod === id) selPeriod = null;
    closeModal('modal-confirm');
    await loadPeriods(); renderHistorial();
  };
  openModal('modal-confirm');
}

async function renderPublicaciones() {

async function selP(id) {
  selPeriod = id;
  document.querySelectorAll('.pchip').forEach(c => c.classList.toggle('active', c.getAttribute('onclick')===`selP('${id}')`));
  await loadPubs(id);
}

async function loadPubs(pid) {
  const { data: posts, error } = await db.from('posts').select('*').eq('period_id', pid).order('likes', { ascending: false });
  if (error) { console.error('loadPubs:', error); }
  const wrap = document.getElementById('pubs-wrap');
  if (!posts?.length) { wrap.innerHTML = '<div class="empty"><h3>Sin publicaciones en este período</h3></div>'; return; }
  wrap.innerHTML = `<div class="tbl-wrap"><table>
    <thead><tr><th>⭐</th><th>Fecha</th><th>Descripción</th><th>Tipo</th><th>Likes</th><th>Guardados</th><th>Alcance</th><th>Visualiz.</th><th>Coment.</th><th>Compartid.</th><th>Seguim.</th><th>Link</th></tr></thead>
    <tbody>${posts.map(p=>`<tr>
      <td><button class="star-btn" onclick="star('${p.id}',${p.is_star},this)">${p.is_star?'⭐':'☆'}</button></td>
      <td>${p.pub_date||'—'}</td>
      <td>${(p.description||'—').slice(0,45)}${p.description?.length>45?'…':''}</td>
      <td>${fmtTipo(p.post_type, true)}</td>
      <td>${N(p.likes)}</td><td>${N(p.saves)}</td><td>${N(p.reach)}</td>
      <td>${N(p.views)}</td><td>${N(p.comments)}</td><td>${N(p.shares)}</td><td>${N(p.follows)}</td>
      <td class="lnk">${p.link?`<a href="${p.link}" target="_blank">Ver →</a>`:'—'}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

async function star(id, cur, btn) {
  const nw = !cur;
  await db.from('posts').update({ is_star: nw }).eq('id', id);
  btn.textContent = nw ? '⭐' : '☆';
  btn.setAttribute('onclick', `star('${id}',${nw},this)`);
}

  // Test read clients

  lines.push(clErr ? `❌ clients SELECT: ${clErr.message}` : `✅ clients SELECT: OK`);

  // Test insert metric_periods (dry run — usamos un select para verificar permisos)

function handleCSV(e) {
  const file = e.target.files[0];
  if (!file) return;
  Papa.parse(file, {
    header: true, skipEmptyLines: true, encoding: 'UTF-8',
    complete: r => processCSV(r.data)
  });
}

function parseMetaDate(raw) {
  // Format: "MM/DD/YYYY HH:MM" → "YYYY-MM-DD"
  if (!raw) return null;
  const datePart = raw.split(' ')[0];
  const parts = datePart.split('/');
  if (parts.length !== 3) return null;
  return `${parts[2]}-${parts[0].padStart(2,'0')}-${parts[1].padStart(2,'0')}`;
}

function toInt(val) {
  const n = parseInt(String(val).replace(/\D/g, '') || '0');
  return isNaN(n) ? 0 : n;
}

function processCSV(rows) {
  if (!rows.length) {
    document.getElementById('csv-preview').innerHTML = '<div class="err">El archivo está vacío.</div>';
    return;
  }

  // Mostrar columnas detectadas para diagnóstico
  const cols = Object.keys(rows[0]);
  console.log('[processCSV] Columnas detectadas:', cols);

  // Detectar columnas — normaliza acentos para evitar problemas de encoding del CSV
  const norm = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  // Primero intenta match exacto, luego parcial (evita que "Comentarios" matchee "Comentarios sobre la publicación")
  const findColExact   = (kws) => cols.find(c => kws.some(k => norm(c) === norm(k)));
  const findColPartial = (kws) => cols.find(c => kws.some(k => norm(c).includes(norm(k))));
  const findCol = (kws) => findColExact(kws) || findColPartial(kws);

  const COL_ID     = findCol(['Identificador','identificador']);
  const COL_LINK   = findCol(['Enlace','enlace','permanente','Permalink','permalink']);
  // 'publicaci' removido — matchea "Tipo de publicación" antes que "Hora de publicación"
  const COL_HORA   = findCol(['Hora de publicación','Hora de publicacion','Publication time','Publish time','Post time','Hora','hora','Time published']);
  const COL_TIPO   = findCol(['Tipo de publicación','Tipo de publicacion','Post type','Content type','Tipo','tipo']);
  const COL_DESC   = findCol(['Descripci','descripci']);
  const COL_REACH  = findCol(['Alcance','alcance']);
  const COL_VIEWS  = findCol(['Visualizaci','visualizaci']);
  const COL_LIKES  = findCol(['gusta','Me gusta']);
  const COL_SHARES = findCol(['compartió','compartio','Compartid']);
  const COL_FOLLOW = findCol(['Seguimiento','seguimiento']);
  // Para Comentarios: match exacto primero para no confundir con "Comentarios sobre la publicación"
  const COL_COMM   = findColExact(['Comentarios','comentarios','Comments','comments'])
                  || cols.find(c => (norm(c).includes('comentario') || norm(c).includes('comment')) && !norm(c).includes('sobre') && !norm(c).includes('publicaci'));
  const COL_SAVES  = findCol(['guard','Guard']);

  console.log('[processCSV] Columnas CSV:', cols);
  console.log('[processCSV] Mapeo:', { COL_ID, COL_LINK, COL_HORA, COL_TIPO, COL_REACH, COL_VIEWS, COL_LIKES, COL_COMM, COL_SAVES, COL_SHARES, COL_FOLLOW });

  // Filtrar filas válidas
  const posts = rows.filter(r => (COL_ID && r[COL_ID]) || (COL_LINK && r[COL_LINK]));

  if (!posts.length) {
    document.getElementById('csv-preview').innerHTML = `
      <div class="err">No se encontraron publicaciones.<br><br>
      <strong>Columnas detectadas en el CSV:</strong><br>
      <code style="font-size:11px">${cols.join(' | ')}</code>
      </div>`;
    return;
  }

  const totals = posts.reduce((acc, r) => ({
    reach:    acc.reach    + toInt(COL_REACH  ? r[COL_REACH]  : 0),
    views:    acc.views    + toInt(COL_VIEWS  ? r[COL_VIEWS]  : 0),
    likes:    acc.likes    + toInt(COL_LIKES  ? r[COL_LIKES]  : 0),
    shares:   acc.shares   + toInt(COL_SHARES ? r[COL_SHARES] : 0),
    follows:  acc.follows  + toInt(COL_FOLLOW ? r[COL_FOLLOW] : 0),
    comments: acc.comments + toInt(COL_COMM   ? r[COL_COMM]   : 0),
    saves:    acc.saves    + toInt(COL_SAVES  ? r[COL_SAVES]  : 0),
  }), { reach:0, views:0, likes:0, shares:0, follows:0, comments:0, saves:0 });

  const dates = posts.map(r => COL_HORA ? parseMetaDate(r[COL_HORA]) : null).filter(Boolean).sort();

  csvData = { posts, totals, dateMin: dates[0]||null, dateMax: dates[dates.length-1]||null, cols: { COL_ID, COL_LINK, COL_HORA, COL_TIPO, COL_DESC, COL_REACH, COL_VIEWS, COL_LIKES, COL_SHARES, COL_FOLLOW, COL_COMM, COL_SAVES } };

  document.getElementById('csv-preview').innerHTML = `
    <div class="preview-box">
      <h4>✅ ${posts.length} publicaciones encontradas · ${dates[0]||'?'} a ${dates[dates.length-1]||'?'}</h4>
      <div>
        <div class="stat-chip"><span>${N(totals.reach)}</span>Alcance</div>
        <div class="stat-chip"><span>${N(totals.views)}</span>Visualizaciones</div>
        <div class="stat-chip"><span>${N(totals.likes)}</span>Me gusta</div>
        <div class="stat-chip"><span>${N(totals.saves)}</span>Guardados</div>
        <div class="stat-chip"><span>${N(totals.shares)}</span>Compartidos</div>
        <div class="stat-chip"><span>${N(totals.comments)}</span>Comentarios</div>
        <div class="stat-chip"><span>${N(totals.follows)}</span>Seguimientos</div>
      </div>
    </div>`;
  document.getElementById('btn-save').style.display = 'flex';
}

function showSaveError(msg) {
  const prev = document.getElementById('csv-preview');
  prev.innerHTML = `<div class="err" style="margin-top:12px;white-space:pre-wrap;word-break:break-all">❌ ${msg}</div>`;
}

async function saveCSV() {
  const label = document.getElementById('p-label').value.trim();
  if (!label) { showSaveError('Completá el nombre del período antes de guardar.'); return; }
  if (!csvData) { showSaveError('Primero subí el CSV.'); return; }
  if (!client || !client.id) { showSaveError('Error interno: cliente no cargado. Volvé al listado y abrí el cliente de nuevo.'); return; }

  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Guardando...';

  const periodStart = csvData.dateMin || new Date().toISOString().split('T')[0];
  const periodEnd   = csvData.dateMax || periodStart;

  console.log('[saveCSV] client.id:', client.id, '| periodStart:', periodStart, '| periodEnd:', periodEnd, '| posts:', csvData.posts.length);

  // 1. Guardar el período
  const periodPayload = {
    client_id:      client.id,
    period_label:   label,
    period_start:   periodStart,
    period_end:     periodEnd,
    total_posts:    csvData.posts.length,
    total_reach:    csvData.totals.reach,
    total_views:    csvData.totals.views,
    total_likes:    csvData.totals.likes,
    total_saves:    csvData.totals.saves,
    total_shares:   csvData.totals.shares,
    total_comments: csvData.totals.comments,
    total_follows:  csvData.totals.follows,
  };
  console.log('[saveCSV] periodPayload:', JSON.stringify(periodPayload));

  const { data: period, error: pErr } = await db.from('metric_periods').insert(periodPayload).select().single();

  if (pErr) {
    console.error('[saveCSV] Error período:', pErr);
    showSaveError(`Error guardando período:\n${pErr.message}\n\nCódigo: ${pErr.code}\nDetalles: ${pErr.details || '—'}\nHint: ${pErr.hint || '—'}`);
    btn.disabled = false; btn.innerHTML = '💾 Guardar período y publicaciones';
    return;
  }
  console.log('[saveCSV] Período guardado OK. ID:', period.id);

  // 2. Guardar cada publicación
  const c = csvData.cols || {};
  const toInsert = csvData.posts.map(r => ({
    client_id:   client.id,
    period_id:   period.id,
    pub_date:    (c.COL_HORA ? parseMetaDate(r[c.COL_HORA]) : null) || periodStart,
    post_type:   c.COL_TIPO  ? (r[c.COL_TIPO]  || null) : null,
    link:        c.COL_LINK  ? (r[c.COL_LINK]  || null) : null,
    description: c.COL_DESC  ? (r[c.COL_DESC]  || null) : null,
    reach:       toInt(c.COL_REACH  ? r[c.COL_REACH]  : 0),
    views:       toInt(c.COL_VIEWS  ? r[c.COL_VIEWS]  : 0),
    likes:       toInt(c.COL_LIKES  ? r[c.COL_LIKES]  : 0),
    comments:    toInt(c.COL_COMM   ? r[c.COL_COMM]   : 0),
    shares:      toInt(c.COL_SHARES ? r[c.COL_SHARES] : 0),
    saves:       toInt(c.COL_SAVES  ? r[c.COL_SAVES]  : 0),
    follows:     toInt(c.COL_FOLLOW ? r[c.COL_FOLLOW] : 0),
  }));

  console.log('[saveCSV] Insertando', toInsert.length, 'posts. Primer post:', JSON.stringify(toInsert[0]));

  // Insertar en lotes de 50 para evitar límites
  const BATCH = 50;
  for (let i = 0; i < toInsert.length; i += BATCH) {
    const batch = toInsert.slice(i, i + BATCH);
    const { error: postsErr } = await db.from('posts').insert(batch);
    if (postsErr) {
      console.error('[saveCSV] Error posts lote', i, postsErr);
      showSaveError(`Error guardando publicaciones (lote ${i}-${i+BATCH}):\n${postsErr.message}\n\nCódigo: ${postsErr.code}\nDetalles: ${postsErr.details || '—'}\nHint: ${postsErr.hint || '—'}`);
      btn.disabled = false; btn.innerHTML = '💾 Guardar período y publicaciones';
      return;
    }
  }

  // 3. Éxito
  console.log('[saveCSV] ✅ Todo guardado correctamente.');
  csvData = null;
  // Resetear el input para que el mismo archivo pueda volver a subirse si hace falta
  const csvInput = document.getElementById('csv-input');
  if (csvInput) csvInput.value = '';
  await loadPeriods();
  btn.disabled = false; btn.innerHTML = '💾 Guardar período y publicaciones';
  document.getElementById('csv-preview').innerHTML = `<div style="background:#D1FAE5;color:#065F46;padding:14px;border-radius:8px;font-weight:600;">✅ Período "${label}" guardado con ${toInsert.length} publicaciones.</div>`;
  setTimeout(() => switchTab('resumen'), 1500);
}

// ALERTS
// ═══════════════════════════════════════════
async function checkAlerts() {
  const now = new Date();
  const months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const pending = [], upcoming = [];

  // Una sola query para traer todos los períodos de todos los clientes activos
  const activeIds = clients.filter(c => c.active && c.start_date && new Date(c.start_date) <= now).map(c => c.id);
  if (!activeIds.length) { document.getElementById('alerts-box').innerHTML = ''; return; }
  const { data: allPeriods } = await db.from('metric_periods').select('client_id,period_label').in('client_id', activeIds);

  // Agrupar labels por client_id
  const labelsByClient = {};
  (allPeriods||[]).forEach(p => {
    if (!labelsByClient[p.client_id]) labelsByClient[p.client_id] = [];
    labelsByClient[p.client_id].push(p.period_label.toLowerCase());
  });

  const cm = months[now.getMonth()], cy = now.getFullYear();
  const day = now.getDate();
  // Días reales del mes actual (funciona para todos los meses, incluso febrero)
  const daysInMonth = new Date(cy, now.getMonth() + 1, 0).getDate();

  for (const c of clients) {
    if (!c.active || !c.start_date || new Date(c.start_date) > now) continue;
    const labels = labelsByClient[c.id] || [];

    if (c.pieces_per_month === 30) {
      const falta1 = !labels.some(l => (l.includes('1-15')||l.includes('primera')) && l.includes(cm) && l.includes(String(cy)));
      const falta2 = !labels.some(l => (l.includes('16')||l.includes('segunda')) && l.includes(cm) && l.includes(String(cy)));
      if (falta1) {
        if (day >= 15) pending.push({ name: c.name, msg: `1ª quincena de ${cm} ${cy}`, urgente: true });
        else if (day >= 13) upcoming.push({ name: c.name, msg: `1ª quincena de ${cm} ${cy} — vence en ${15-day} días`, urgente: false });
      }
      if (falta2) {
        if (day >= 28) pending.push({ name: c.name, msg: `2ª quincena de ${cm} ${cy}`, urgente: true });
        else if (day >= 26) upcoming.push({ name: c.name, msg: `2ª quincena de ${cm} ${cy} — vence en ${28-day} días`, urgente: false });
      }
    } else {
      const pm = now.getMonth() === 0 ? 11 : now.getMonth() - 1;
      const py = now.getMonth() === 0 ? now.getFullYear()-1 : now.getFullYear();
      const faltaMes = !labels.some(l => l.includes(months[pm]) && l.includes(String(py)));
      if (faltaMes && day >= 3) pending.push({ name: c.name, msg: `${months[pm]} ${py}`, urgente: day >= 10 });
      const faltaActual = !labels.some(l => l.includes(cm) && l.includes(String(cy)));
      // Usar daysInMonth para calcular correctamente los días restantes
      if (faltaActual && day >= daysInMonth - 3) upcoming.push({ name: c.name, msg: `${cm} ${cy} — cierra en ${daysInMonth - day} días`, urgente: false });
    }
  }

  const el = document.getElementById('alerts-box');
  if (!pending.length && !upcoming.length) { el.innerHTML = ''; return; }

  const pendingHtml = pending.length ? `
    <div style="margin-bottom:8px">
      <div style="font-size:12px;font-weight:700;color:#B91C1C;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px">⚠️ Vencidas</div>
      ${pending.map(a => `
        <div class="alert-item" style="border-left:3px solid var(--danger)">
          <strong>${a.name}</strong> — falta cargar <strong>${a.msg}</strong>
        </div>`).join('')}
    </div>` : '';

  const upcomingHtml = upcoming.length ? `
    <div>
      <div style="font-size:12px;font-weight:700;color:#92400E;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px">🔔 Por vencer</div>
      ${upcoming.map(a => `
        <div class="alert-item" style="border-left:3px solid var(--accent);background:#FFFBEB">
          <strong>${a.name}</strong> — ${a.msg}
        </div>`).join('')}
    </div>` : '';

  el.innerHTML = `<div class="alert-box"><h3>📋 Métricas pendientes</h3>${pendingHtml}${upcomingHtml}</div>`;
}

async function renderIA() {
  const el = document.getElementById('c-ia');
  if (!client.notion_database_id) {
    el.innerHTML = `<div class="ai-center"><h3>✨ Análisis IA</h3>
      <p>Necesitás cargar el <strong>Notion Database ID</strong> del cliente para usar esta función.</p>
      <button class="btn btn-s" onclick="openEditClient()">✏️ Editar cliente</button></div>`;
    return;
  }

  // Calcular rango default: último mes completo
  const now = new Date();
  const firstDay = new Date(now.getFullYear(), now.getMonth()-1, 1);
  const lastDay  = new Date(now.getFullYear(), now.getMonth(), 0);
  const fmt = d => d.toISOString().split('T')[0];

  // Preservar fechas que el usuario haya ingresado previamente
  const savedFrom = document.getElementById('ia-from')?.value || fmt(firstDay);
  const savedTo   = document.getElementById('ia-to')?.value   || fmt(lastDay);

  el.innerHTML = `
    <div style="padding:24px">
      <div class="ai-center" style="margin-bottom:0">
        <h3>✨ Análisis IA de contenido</h3>
        <p>Claude cruza los guiones de Notion con las métricas de Meta para detectar qué funciona y qué no.</p>
      </div>

      <div style="background:white;border:1px solid var(--gray-200);border-radius:12px;padding:20px;margin:20px 0;display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end">
        <div class="fg" style="margin:0;flex:1;min-width:140px">
          <label>Desde</label>
          <input type="date" id="ia-from" value="${savedFrom}">
        </div>
        <div class="fg" style="margin:0;flex:1;min-width:140px">
          <label>Hasta</label>
          <input type="date" id="ia-to" value="${savedTo}">
        </div>
        <button class="btn btn-p" id="btn-ia-run" onclick="runIA()">🚀 Analizar con IA</button>
      </div>

      <div id="ia-prog" style="display:none;margin-bottom:16px">
        <p id="ia-txt" style="color:var(--gray-500);font-size:14px;margin-bottom:8px"></p>
        <div class="pb-wrap"><div class="pb" id="ia-bar" style="width:0%"></div></div>
      </div>
      <div id="ia-results"></div>

      <div id="ia-history" style="margin-top:32px"></div>
    </div>`;

  // Cargar análisis guardados
  loadIAHistory();
}

function iaProgress(pct, txt) {
  document.getElementById('ia-prog').style.display = 'block';
  document.getElementById('ia-bar').style.width = pct + '%';
  document.getElementById('ia-txt').textContent = txt;
}

async function runIA() {
  const btn = document.getElementById('btn-ia-run');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Analizando...';
  document.getElementById('ia-results').innerHTML = '';
  const dateFrom = document.getElementById('ia-from')?.value || '';
  const dateTo   = document.getElementById('ia-to')?.value   || '';
  try {
    iaProgress(10, 'Conectando con Notion...');
    const allScripts = await getNotionScripts(client.notion_database_id);
    if (!allScripts.length) {
      document.getElementById('ia-results').innerHTML = '<div class="empty"><h3>No se encontraron guiones en Notion</h3></div>';
      btn.disabled = false; btn.innerHTML = '🔄 Volver a analizar'; return;
    }

    // Filtrar por rango de fechas si están definidos
    const scripts = (dateFrom && dateTo)
      ? allScripts.filter(s => {
          if (!s.upload_date) return true; // sin fecha siempre incluir
          return s.upload_date >= dateFrom && s.upload_date <= dateTo;
        })
      : allScripts;

    iaProgress(30, `${scripts.length} guiones encontrados. Cargando contenido de páginas...`);

    // Traer el contenido interno de cada página de Notion (guión, referencia, copy)
    const scriptsToFetch = scripts.slice(0, 40);
    const pageIds = scriptsToFetch.map(s => s.pageId).filter(Boolean);
    let blocksMsg = '';

    if (!pageIds.length) {
      blocksMsg = '⚠️ Los guiones no tienen pageId — verificá que el Edge Function esté actualizado.';
    } else {
      iaProgress(35, `Cargando contenido de ${pageIds.length} guiones...`);
      try {
        const blocksRes = await fetch(EDGE_FN, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SB_KEY}` },
          body: JSON.stringify({ action: 'notion_blocks', pageIds })
        });

        const rawBlocks = await blocksRes.text();
        console.log('[IA blocks] status:', blocksRes.status, '| respuesta:', rawBlocks.slice(0, 300));

        if (!blocksRes.ok) {
          blocksMsg = `⚠️ Error cargando guiones: HTTP ${blocksRes.status} — ${rawBlocks.slice(0,150)}`;
        } else {
          const blocksData = JSON.parse(rawBlocks);
          const { contents, ok, failed, firstError } = blocksData;

          if (blocksData.error) {
            blocksMsg = `⚠️ Edge Function: ${blocksData.error} — ¿Está desplegada la versión nueva?`;
          } else if (contents) {
            scriptsToFetch.forEach(s => {
              const structured = s.pageId ? contents[s.pageId] : null;
              if (structured) {
                if (structured.guion)  s.guion_text = structured.guion.slice(0, 800);
                if (structured.hook)   s.hook_real  = structured.hook;
                if (structured.cta)    s.cta_real   = structured.cta;
              }
            });
            const withContent = scriptsToFetch.filter(s => s.guion_text).length;
            if (withContent === 0) {
              // Mostrar estructura real del primer guión para diagnosticar
              const firstId = pageIds[0];
              const firstRaw = contents[firstId];
              blocksMsg = `⚠️ 0 guiones con contenido. Estructura detectada en primera página: <code>${JSON.stringify(firstRaw).slice(0,200)}</code>`;
            } else {
              blocksMsg = `✅ ${withContent}/${pageIds.length} guiones con contenido cargado.`;
            }
            if (firstError) blocksMsg += ` | Error en ${failed}: ${firstError}`;
          }
        }
      } catch(e: any) {
        blocksMsg = `⚠️ Error de red al cargar guiones: ${e?.message}`;
        console.error('[IA blocks]', e);
      }
    }

    // Mostrar diagnóstico en pantalla
    if (blocksMsg) {
      const color = blocksMsg.startsWith('✅') ? '#ECFDF5' : '#FEF3C7';
      const border = blocksMsg.startsWith('✅') ? '#6EE7B7' : '#FCD34D';
      document.getElementById('ia-results').innerHTML =
        `<div style="background:${color};border:1px solid ${border};border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px">${blocksMsg}</div>`;
    }

    iaProgress(50, 'Cruzando guiones con métricas de Meta...');

    // Traer posts del período
    let postsQuery = db.from('posts').select('pub_date,likes,saves,reach,shares,comments,views,follows,post_type,description').eq('client_id', client.id);
    if (dateFrom) postsQuery = postsQuery.gte('pub_date', dateFrom);
    if (dateTo)   postsQuery = postsQuery.lte('pub_date', dateTo);
    const { data: allPosts } = await postsQuery;

    const byDate = {};
    (allPosts||[]).forEach(p => { if (p.pub_date) byDate[p.pub_date] = p; });

    // Cruce por fecha
    const crossed = scripts.map(s => ({ ...s, metrics: s.upload_date ? byDate[s.upload_date] : null })).filter(s => s.metrics);

    const notionDates = scripts.map(s => s.upload_date).filter(Boolean);
    const metaDates   = Object.keys(byDate).sort();
    console.log('[IA] Fechas Notion:', notionDates.slice(0,5), '| Fechas Meta:', metaDates.slice(0,5));
    console.log('[IA] Columnas Notion:', scripts[0]?._cols);

    // Mostrar diagnóstico de fechas si no hay cruces
    if (!crossed.length && notionDates.length > 0 && metaDates.length > 0) {
      document.getElementById('ia-results').innerHTML = `
        <div style="background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px;padding:12px;margin-bottom:12px;font-size:12px;color:#1E40AF">
          🔍 <strong>Diagnóstico de fechas:</strong><br>
          Notion (${notionDates.length} guiones con fecha): <code>${notionDates.slice(0,5).join(', ')}</code><br>
          Meta posts (${metaDates.length} posts): <code>${metaDates.slice(0,5).join(', ')}</code><br>
          ${notionDates.length && metaDates.length ? 'Verificá que las fechas de "Fecha subido" en Notion coincidan con las fechas de publicación en Meta.' : ''}
        </div>`;
    }

    const statusMsg = crossed.length
      ? `${crossed.length} piezas cruzadas. Enviando a Claude...`
      : `0 cruces (Notion: ${notionDates.length} fechas | Meta: ${metaDates.length} fechas). Analizando igual...`;
    iaProgress(70, statusMsg);

    const analysis = await callClaude(scripts, crossed, allPosts||[], dateFrom, dateTo);
    iaProgress(90, 'Guardando análisis...');

    // Guardar en Supabase
    await saveIAAnalysis(analysis, scripts.length, crossed.length, dateFrom, dateTo);

    iaProgress(95, 'Renderizando resultados...');
    renderIAResults(analysis, scripts.length, crossed.length, notionDates, metaDates, dateFrom, dateTo);
    iaProgress(100, '¡Análisis completado!');
    loadIAHistory(); // refrescar historial
  } catch(err) {
    document.getElementById('ia-results').innerHTML = `<div class="err">Error: ${err.message}</div>`;
    console.error(err);
  }
  btn.disabled = false; btn.innerHTML = '🔄 Volver a analizar';
}

async function saveIAAnalysis(analysis, totalScripts, crossedCount, dateFrom, dateTo) {
  try {
    const label = (dateFrom && dateTo) ? `${dateFrom} → ${dateTo}` : 'Sin filtro de fecha';
    await db.from('ia_analyses').insert({
      client_id:     client.id,
      period_label:  label,
      date_from:     dateFrom || null,
      date_to:       dateTo   || null,
      total_scripts: totalScripts,
      crossed_count: crossedCount,
      result:        analysis,
      created_by:    user.id
    });
  } catch(e) {
    console.warn('No se pudo guardar el análisis (tabla ia_analyses quizás no existe):', e.message);
  }
}

async function getNotionScripts(dbId) {
  const clean = (dbId||'').replace(/-/g, '');
  const fid = clean.length === 32
    ? [clean.slice(0,8),clean.slice(8,12),clean.slice(12,16),clean.slice(16,20),clean.slice(20)].join('-')
    : dbId; // si ya tiene guiones, usarlo directo
  console.log('[Notion] dbId original:', dbId, '| fid formateado:', fid);
  const res = await fetch(EDGE_FN, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SB_KEY}` },
    body: JSON.stringify({ databaseId: fid })
  });
  if (!res.ok) throw new Error(`Edge Function error: ${res.status} — ${await res.text()}`);
  const data = await res.json();
  console.log('[Notion] Respuesta cruda:', JSON.stringify(data).slice(0, 500));

  // Mostrar diagnóstico en pantalla
  if (data.object === 'error') {
    throw new Error(`Notion error ${data.status}: ${data.message}`);
  }
  if (!data.results) {
    document.getElementById('ia-results').innerHTML = `
      <div class="err" style="white-space:pre-wrap;font-size:12px">
        ❌ Notion no devolvió 'results'. Respuesta completa:\n${JSON.stringify(data, null, 2).slice(0,1000)}
      </div>`;
    throw new Error('Notion no devolvió results — ver diagnóstico arriba');
  }
  if (data.results.length === 0) {
    document.getElementById('ia-results').innerHTML = `
      <div style="background:#FEF3C7;border:1px solid #FCD34D;border-radius:8px;padding:16px;margin-bottom:16px">
        ⚠️ <strong>Notion devolvió 0 páginas.</strong> La base de datos está vacía o el Database ID es incorrecto.<br><br>
        <strong>Database ID usado:</strong> ${fid}<br>
        <strong>Respuesta:</strong> ${JSON.stringify(data).slice(0,300)}
      </div>`;
    throw new Error('Notion devolvió 0 páginas');
  }
  return parseScripts(data.results);
}

function normalizeDate(raw) {
  if (!raw) return null;
  const s = String(raw).trim();

  // Ya está en formato YYYY-MM-DD (con o sin hora)
  const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (iso) return `${iso[1]}-${iso[2]}-${iso[3]}`;

  // DD/MM/YYYY, MM/DD/YYYY o DD-MM-YYYY
  // Lógica: si el segundo número > 12, sólo puede ser MM/DD/YYYY (el mes no puede ser > 12)
  // En cualquier otro caso, asumir DD/MM/YYYY (formato argentino por defecto)
  const dmy = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
  if (dmy) {
    const second = parseInt(dmy[2]);
    if (second > 12) {
      // Es MM/DD/YYYY: primer nro = mes, segundo = día
      return `${dmy[3]}-${dmy[1].padStart(2,'0')}-${dmy[2].padStart(2,'0')}`;
    }
    // DD/MM/YYYY (argentino) o ambiguo → asumir DD/MM
    return `${dmy[3]}-${dmy[2].padStart(2,'0')}-${dmy[1].padStart(2,'0')}`;
  }

  // "April 7, 2026" o "7 de abril de 2026" — usar Date.parse
  const months = { january:1,february:2,march:3,april:4,may:5,june:6,july:7,august:8,september:9,october:10,november:11,december:12,
    enero:1,febrero:2,marzo:3,abril:4,mayo:5,junio:6,julio:7,agosto:8,septiembre:9,octubre:10,noviembre:11,diciembre:12 };
  const named = s.toLowerCase().match(/(\d{1,2})\s+de\s+(\w+)\s+de\s+(\d{4})/);
  if (named && months[named[2]]) {
    return `${named[3]}-${String(months[named[2]]).padStart(2,'0')}-${named[1].padStart(2,'0')}`;
  }
  const named2 = s.toLowerCase().match(/(\w+)\s+(\d{1,2}),?\s+(\d{4})/);
  if (named2 && months[named2[1]]) {
    return `${named2[3]}-${String(months[named2[1]]).padStart(2,'0')}-${named2[2].padStart(2,'0')}`;
  }

  // Último recurso: Date.parse
  const d = new Date(s);
  if (!isNaN(d)) return d.toISOString().split('T')[0];

  return null;
}

function parseScripts(pages) {
  return pages.map(page => {
    const pp = page.properties;
    const g = p => {
      if (!p) return null;
      if (p.type==='title') return p.title?.map(t=>t.plain_text).join('')||null;
      if (p.type==='rich_text') return p.rich_text?.map(t=>t.plain_text).join('')||null;
      if (p.type==='select') return p.select?.name||null;
      if (p.type==='multi_select') return p.multi_select?.map(s=>s.name).join(', ')||null;
      if (p.type==='date') return p.date?.start||null;
      if (p.type==='status') return p.status?.name||null;
      return null;
    };
    let uploadDate = null;
    const colNames = Object.keys(pp);

    // 1. Buscar por nombre exacto en columnas de tipo date (orden de prioridad)
    const datePriorityKeys = [
      'Fecha publicación','Fecha publicacion','Fecha de publicación','Fecha de publicacion',
      'Fecha subido','Fecha subida','Fecha publicado',
      'Fecha','Date','Publicado','Publicación','Publicacion'
    ];
    for (const key of datePriorityKeys) {
      if (pp[key]?.type === 'date' && pp[key].date?.start) {
        uploadDate = normalizeDate(pp[key].date.start);
        break;
      }
    }
    // 2. Si no encontró por nombre, tomar la primera columna de tipo date
    if (!uploadDate) {
      for (const k of colNames) {
        if (pp[k].type === 'date' && pp[k].date?.start) {
          uploadDate = normalizeDate(pp[k].date.start);
          break;
        }
      }
    }
    // 3. Fallback: buscar en columnas de texto que parezcan fechas
    if (!uploadDate) {
      for (const k of colNames) {
        const v = g(pp[k]);
        const nd = normalizeDate(v);
        if (nd) { uploadDate = nd; break; }
      }
    }
    const tk = colNames.find(k => pp[k].type==='title');
    const pageId = page.id; // necesario para traer bloques después

    // Buscar el body/guión en propiedades (fallback — si no hay, lo traemos de bloques)
    const bodyKeys = ['Guión','Guion','Body','Script','Contenido','Texto','Descripción','Descripcion','Caption','Copy','Libreto','Desarrollo','Cuerpo'];
    let body = null;
    for (const bk of bodyKeys) {
      const val = g(pp[bk]);
      if (val && val.length > 20) { body = val; break; }
    }
    // Si no encontró por nombre exacto, buscar el rich_text más largo que no sea hook ni CTA
    if (!body) {
      const hookVal = g(pp['Hook']||pp['Gancho']||pp['Intro']);
      const ctaVal  = g(pp['CTA']||pp['Call to action']||pp['Llamada']);
      const candidates = colNames
        .filter(k => pp[k].type === 'rich_text')
        .map(k => ({ k, v: g(pp[k]) }))
        .filter(({v}) => v && v.length > 30 && v !== hookVal && v !== ctaVal)
        .sort((a,b) => (b.v?.length||0) - (a.v?.length||0));
      if (candidates.length) body = candidates[0].v;
    }

    return {
      title:      g(pp[tk]) || 'Sin título',
      tema:       g(pp['Tema']||pp['Ángulo']||pp['Angulo']||pp['Nicho']),
      estructura: g(pp['Estructura']||pp['Formato']||pp['Tipo']||pp['Estilo']),
      cta:        g(pp['CTA']||pp['Call to action']||pp['Llamada']),
      hook:       g(pp['Hook']||pp['Gancho']||pp['Intro']),
      pilar:      g(pp['Pilar']||pp['Categoría']||pp['Categoria']||pp['Pilares']),
      body:       body ? body.slice(0, 500) : null,
      upload_date: uploadDate,
      pageId,
      _cols:      colNames.join(', '),
    };
  });
}

async function callClaude(scripts, crossed, allPosts, dateFrom, dateTo) {
  // Construir resumen detallado de cada guión para Claude
  const scriptsSummary = scripts.slice(0, 50).map((s, i) => {
    const m = s.metrics;
    const metricsLine = m
      ? `  📊 ${m.likes||0} likes | ${m.saves||0} guardados | ${m.comments||0} comentarios | ${m.reach||0} alcance`
      : '';
    const hookLine  = s.hook_real || s.hook ? `  HOOK (1ª frase negrita SLIDE 1): "${s.hook_real || s.hook}"` : '';
    const ctaLine   = s.cta_real  || s.cta  ? `  CTA  (última frase): "${s.cta_real  || s.cta}"` : '';
    const guionBlock = s.guion_text
      ? `  GUIÓN:\n${s.guion_text.split('\n').map(l => '    ' + l).join('\n')}`
      : (s.body ? `  GUIÓN (parcial): ${s.body}` : '  GUIÓN: no disponible');
    return [
      `[${i+1}] "${s.title}" | Formato: ${s.estructura||'?'}`,
      hookLine, guionBlock, ctaLine, metricsLine,
    ].filter(Boolean).join('\n');
  }).join('\n\n────────────────\n\n');

  // Resumen de métricas generales por tipo
  let metaSummary = '';
  if (allPosts.length) {
    const avg = (arr, key) => arr.length ? Math.round(arr.reduce((a,p)=>a+(p[key]||0),0)/arr.length) : 0;
    const byType = {};
    allPosts.forEach(p => { const t = fmtTipo(p.post_type)||'Desconocido'; if (!byType[t]) byType[t]=[]; byType[t].push(p); });
    const typeBreakdown = Object.entries(byType).map(([t, ps]) =>
      `  ${t} (${ps.length}): avg guardados ${avg(ps,'saves')} | avg comentarios ${avg(ps,'comments')} | avg alcance ${avg(ps,'reach')}`
    ).join('\n');
    metaSummary = `\nMÉTRICAS META (${allPosts.length} posts, breakdown por tipo):\n${typeBreakdown}`;
  }

  const periodoLabel = (dateFrom && dateTo) ? `del ${dateFrom} al ${dateTo}` : 'sin filtro de período';
  const prompt = `Sos estratega de contenido para la agencia ItsCrear. Analizá los guiones REALES del cliente "${client.name}" (período: ${periodoLabel}).

REGLA: Leé cada guión completo. No inventes ni generalices. Citá frases literales. Si el guión no está disponible, usá solo el hook y el título.

Los guiones están organizados así en Notion:
- HOOK = primera frase en negrita del SLIDE 1 (lo que abre el contenido)
- GUIÓN = el desarrollo completo slide por slide
- CTA = última frase del guión (la llamada a la acción)

════════ GUIONES DEL PERÍODO (${scripts.length} piezas) ════════
${scriptsSummary}
${metaSummary}

════════ LO QUE TENÉS QUE HACER ════════
Analizá ESTAS 4 DIMENSIONES ESPECÍFICAS basándote en los guiones de arriba:

1. HOOKS: Leé la primera frase negrita del SLIDE 1 de cada guión. Clasificá por estilo: ¿pregunta directa? ¿dato/estadística? ¿afirmación polémica? ¿descripción de un problema? ¿curiosidad? ¿historia? ¿Si las métricas lo indican, cuál genera más guardados o comentarios?
