CTA: "[texto literal del CTA]" | TIPO: [keyword/guardar/seguir/link] | GUION: "[título del guión donde aparece]"
CTA: "[texto literal del CTA]" | TIPO: [keyword/guardar/seguir/link] | GUION: "[título del guión donde aparece]"
RECOMENDAR: [el CTA exacto para el próximo período y en qué momento del guión ponerlo]

##PROXIMOS##
REPLICAR | TITULO: [título completo] | FORMATO: [Carrusel/Video] | HOOK: [primera oración completa lista para grabar] | RAZON: [qué pieza o patrón de este período lo justifica]
REPLICAR | TITULO: [título completo] | FORMATO: [Carrusel/Video] | HOOK: [primera oración completa lista para grabar] | RAZON: [qué pieza o patrón de este período lo justifica]
REPLICAR | TITULO: [título completo] | FORMATO: [Carrusel/Video] | HOOK: [primera oración completa lista para grabar] | RAZON: [qué pieza o patrón de este período lo justifica]
PROBAR | TITULO: [título completo] | FORMATO: [Carrusel/Video] | HOOK: [primera oración completa lista para grabar] | RAZON: [por qué podría funcionar aunque no se haya hecho antes]
PROBAR | TITULO: [título completo] | FORMATO: [Carrusel/Video] | HOOK: [primera oración completa lista para grabar] | RAZON: [por qué podría funcionar aunque no se haya hecho antes]`;

  // Llamar a Claude via Edge Function
  const res = await fetch(EDGE_FN, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SB_KEY}` },
    body: JSON.stringify({ action: 'claude', prompt })
  });
  if (!res.ok) throw new Error(`Edge Function error: ${res.status} — ${await res.text()}`);
  const rawText = await res.text();
  let txt = '';
  try {
    const d = JSON.parse(rawText);
    if (d.error) throw new Error(d.error);
    txt = d.text || d.content?.[0]?.text || '';
  } catch(jsonErr) {
    // Si el JSON del wrapper falla, intentar extraer el texto directamente
    // buscando el contenido entre las secciones ##
    const secMatch = rawText.match(/##RESUMEN##[\s\S]*/);
    if (secMatch) {
      txt = secMatch[0];
    } else {
      // Intentar extraer el valor del campo "text" con regex
      const textMatch = rawText.match(/"text"\s*:\s*"([\s\S]*?)"\s*[,}]/);
      if (textMatch) {
        txt = textMatch[1].replace(/\\n/g, '\n').replace(/\\"/g, '"');
      } else {
        throw new Error('Respuesta inválida del Edge Function: ' + rawText.slice(0, 200));
      }
    }
  }
  if (!txt) throw new Error('No se recibió análisis. Respuesta vacía.');

  // Parsear formato de secciones (sin JSON)
  function extractSection(text, tag) {
    const re = new RegExp(`##${tag}##([\\s\\S]*?)(?=##[A-Z_]+##|$)`);
    const m = text.match(re);
    return m ? m[1].trim() : '';
  }

  const resumen    = extractSection(txt, 'RESUMEN');
  const hooksBlock = extractSection(txt, 'HOOKS');
  const temasBlock = extractSection(txt, 'TEMAS');
  const estBlock   = extractSection(txt, 'ESTRUCTURA');
  const ctasBlock  = extractSection(txt, 'CTAS');
  const proxBlock  = extractSection(txt, 'PROXIMOS');

  // Parser genérico de líneas con pipes
  function parseLines(block, startKey) {
    return block.split('\n')
      .filter(l => l.trim().toUpperCase().startsWith(startKey))
      .map(l => {
        const parts = {};
        l.split('|').forEach(p => {
          const ci = p.indexOf(':');
          if (ci > -1) {
            const k = p.slice(0, ci).trim().toLowerCase().replace(/^(replicar|probar)\s*/, '');
            const v = p.slice(ci + 1).trim();
            if (k && v) parts[k] = v;
          }
        });
        return parts;
      }).filter(p => Object.keys(p).length > 0);
  }
  function keyLine(block, key) {
    const l = block.split('\n').find(l => l.trim().toUpperCase().startsWith(key + ':'));
    return l ? l.slice(l.indexOf(':') + 1).trim() : '';
  }

  const hooks = {
    estilos: parseLines(hooksBlock, 'ESTILO'),
    mejor:   keyLine(hooksBlock, 'MEJOR'),
    probar:  keyLine(hooksBlock, 'PROBAR'),
  };
  const temas = {
    dolores:     parseLines(temasBlock, 'DOLOR'),
    oportunidad: keyLine(temasBlock, 'OPORTUNIDAD'),
  };
  const estructura = {
    formulas: parseLines(estBlock, 'FORMULA'),
    replicar: keyLine(estBlock, 'REPLICAR'),
  };
  const ctas = {
    lista:      parseLines(ctasBlock, 'CTA'),
    recomendar: keyLine(ctasBlock, 'RECOMENDAR'),
  };
  const proximos = crossed
    .filter(s => s.guion_text)
    .sort((a, b) => ((b.metrics||{}).saves||0) - ((a.metrics||{}).saves||0))
    .slice(0, 3)
    .map(s => ({
      title: s.title, formato: s.estructura||'—',
      hook: s.hook_real||s.hook||'—', guion: s.guion_text||'—',
      saves: (s.metrics||{}).saves||0, likes: (s.metrics||{}).likes||0,
      comments: (s.metrics||{}).comments||0,
    }));

  const sugeridos = proxBlock.split('\n')
    .filter(l => l.trim().match(/^(REPLICAR|PROBAR)/i))
    .map(l => {
      const tipo = l.trim().toUpperCase().startsWith('REPLICAR') ? 'replicar' : 'probar';
      const parts = { tipo };
      l.replace(/^(REPLICAR|PROBAR)\s*\|?\s*/i, '').split('|').forEach(p => {
        const ci = p.indexOf(':');
        if (ci > -1) { const k = p.slice(0,ci).trim().toLowerCase(); const v = p.slice(ci+1).trim(); if (k&&v) parts[k]=v; }
      });
      return parts;
    }).filter(p => p.titulo);

  return {
    resumen, hooks, temas, estructura, ctas, sugeridos,
    top_piezas: proximos,
    _dateFrom: dateFrom || null,
    _dateTo:   dateTo   || null
  };
}

function renderIAResults(a, total, crossed, notionDates, metaDates, dateFrom, dateTo, extraLabel) {
  // Compatibilidad con análisis guardados en formato viejo
  if (!a.hooks && (a.resumen_ejecutivo || a.patrones_ganadores)) {
    renderIAResultsLegacy(a, total, crossed, notionDates, metaDates, dateFrom, dateTo, extraLabel);
    return;
  }

  const periodo = (dateFrom && dateTo)
    ? `<div style="display:inline-block;background:var(--brand-light);color:var(--brand);font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;margin-bottom:16px">📅 ${dateFrom} → ${dateTo} ${extraLabel||''}</div>`
    : (extraLabel ? `<div style="font-size:12px;color:var(--gray-500);margin-bottom:12px">${extraLabel}</div>` : '');

  const secHdr = (emoji, title, sub) => `
    <div class="ia-section-hdr">
      <span style="font-size:22px">${emoji}</span>
      <h3>${title}</h3>
      ${sub ? `<span>${sub}</span>` : ''}
    </div>`;

  // ── HOOKS ──
  const h = a.hooks || {};
  const hooksHtml = `<div class="ia-section">
    ${secHdr('🎣','Hooks','Primera frase del SLIDE 1')}
    ${(h.estilos||[]).map(e => `
      <div class="ia-item">
        <div class="ia-item-label">${e.estilo||'Estilo'}</div>
        <div class="ia-item-quote">"${e.ejemplo||''}"</div>
        ${e.nota ? `<div class="ia-item-note">→ ${e.nota}</div>` : ''}
      </div>`).join('')}
    ${h.mejor ? `<div class="ia-highlight ia-highlight-green"><div class="ia-highlight-label">✅ El que más funciona</div><div class="ia-highlight-text">${h.mejor}</div></div>` : ''}
    ${h.probar ? `<div class="ia-highlight ia-highlight-blue"><div class="ia-highlight-label">💡 Hook para probar ahora</div><div class="ia-highlight-text" style="font-style:italic">"${h.probar}"</div></div>` : ''}
  </div>`;

  // ── TEMAS ──
  const t = a.temas || {};
  const temasHtml = `<div class="ia-section">
    ${secHdr('💡','Temas y dolores','Qué problema toca cada guión')}
    ${(t.dolores||[]).map(d => `
      <div class="ia-item" style="border-left-color:#7C3AED">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div class="ia-item-label" style="color:#7C3AED">${d.dolor||'—'}</div>
          ${d.piezas ? `<span style="background:#EDE9FE;color:#7C3AED;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px">${d.piezas} piezas</span>` : ''}
        </div>
        ${d.insight ? `<div style="font-size:13px;margin-top:4px;color:#374151">${d.insight}</div>` : ''}
        ${d.metricas ? `<div class="ia-item-note">📊 ${d.metricas}</div>` : ''}
      </div>`).join('')}
    ${t.oportunidad ? `<div class="ia-highlight ia-highlight-yellow"><div class="ia-highlight-label">🚀 Oportunidad sin explorar</div><div class="ia-highlight-text">${t.oportunidad}</div></div>` : ''}
  </div>`;

  // ── ESTRUCTURA ──
  const est = a.estructura || {};
  const estHtml = `<div class="ia-section">
    ${secHdr('🏗️','Estructura','Fórmula del cuerpo del guión')}
    ${(est.formulas||[]).map(f => `
      <div class="ia-item" style="border-left-color:#0369A1">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div class="ia-item-label" style="color:#0369A1">${f.formula||'—'}</div>
          ${f.formato ? `<span style="background:#E0F2FE;color:#0369A1;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px">${f.formato}</span>` : ''}
        </div>
        ${f.como ? `<div style="font-size:13px;margin-top:4px;color:#374151">${f.como}</div>` : ''}
        ${f.ejemplo ? `<div style="font-size:12px;color:#6B7280;margin-top:3px">Ej: "${f.ejemplo}"</div>` : ''}
      </div>`).join('')}
    ${est.replicar ? `<div class="ia-highlight ia-highlight-green"><div class="ia-highlight-label">✅ Fórmula a replicar</div><div class="ia-highlight-text">${est.replicar}</div></div>` : ''}
  </div>`;

  // ── CTAs ──
  const c = a.ctas || {};
  const ctasHtml = `<div class="ia-section">
    ${secHdr('📣','CTAs','Última frase del guión')}
    ${(c.lista||[]).map(ct => `
      <div class="ia-item" style="border-left-color:#065F46">
        <div class="ia-item-quote">"${ct.cta||'—'}"</div>
        <div style="display:flex;gap:8px;margin-top:4px">
          ${ct.tipo ? `<span style="background:#D1FAE5;color:#065F46;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px">${ct.tipo}</span>` : ''}
          ${ct.guion ? `<span style="font-size:11px;color:#9CA3AF">en: ${ct.guion}</span>` : ''}
        </div>
      </div>`).join('')}
    ${c.recomendar ? `<div class="ia-highlight ia-highlight-green"><div class="ia-highlight-label">✅ CTA recomendado</div><div class="ia-highlight-text">${c.recomendar}</div></div>` : ''}
  </div>`;

  // ── PRÓXIMOS GUIONES ──
  const sugeridos = a.sugeridos || [];
  const replicar = sugeridos.filter(s => s.tipo === 'replicar');
  const probar   = sugeridos.filter(s => s.tipo === 'probar');
  const proximosHtml = `<div class="ia-section">
    ${secHdr('🚀','Próximo período',`${replicar.length} para replicar · ${probar.length} para probar`)}
    ${replicar.length ? `<div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#7C3AED;margin-bottom:10px">Replicar — lo que ya funcionó</div>
    ${replicar.map(s => `
      <div class="ia-proximo ia-proximo-replicar">
        <div class="ia-proximo-tipo">Replicar</div>
        <h4>${s.titulo||'—'}</h4>
        ${s.formato ? `<span style="background:white;border:1px solid #DDD6FE;color:#7C3AED;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px">${s.formato}</span>` : ''}
        ${s.hook ? `<div class="ia-proximo-hook">"${s.hook}"</div>` : ''}
        ${s.razon ? `<div class="ia-proximo-razon">→ ${s.razon}</div>` : ''}
      </div>`).join('')}` : ''}
    ${probar.length ? `<div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#EA580C;margin:16px 0 10px">Probar — algo nuevo</div>
    ${probar.map(s => `
      <div class="ia-proximo ia-proximo-probar">
        <div class="ia-proximo-tipo">Probar</div>
        <h4>${s.titulo||'—'}</h4>
        ${s.formato ? `<span style="background:white;border:1px solid #FED7AA;color:#EA580C;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px">${s.formato}</span>` : ''}
        ${s.hook ? `<div class="ia-proximo-hook">"${s.hook}"</div>` : ''}
        ${s.razon ? `<div class="ia-proximo-razon">→ ${s.razon}</div>` : ''}
      </div>`).join('')}` : ''}
  </div>`;

  // ── TOP PIEZAS CON GUIÓN VISIBLE ──
  const topPiezas = a.top_piezas || [];
  const topPiezasHtml = topPiezas.length ? `<div class="ia-section">
    ${secHdr('📄','Piezas destacadas','Guión completo de los posts con más guardados')}
    ${topPiezas.map((p, i) => `
      <div class="guion-card">
        <div class="guion-card-hdr" onclick="this.nextElementSibling.classList.toggle('open')">
          <div>
            <div style="font-weight:600;font-size:14px">${p.title||'—'}</div>
            <div style="font-size:12px;color:#6B7280;margin-top:2px">${fmtTipo(p.formato,true)} · ${N(p.saves)} guardados · ${N(p.likes)} likes · ${N(p.comments)} comentarios</div>
          </div>
          <span style="color:#7C3AED;font-size:12px">Ver guión ▼</span>
        </div>
        <div class="guion-card-body">${(p.guion||'').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
      </div>`).join('')}
  </div>` : '';

  document.getElementById('ia-results').innerHTML = `
    ${periodo}
    <div style="background:#F5F3FF;border-left:4px solid #7C3AED;padding:16px 20px;border-radius:0 10px 10px 0;margin-bottom:20px">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#7C3AED;margin-bottom:6px">📋 Resumen</div>
      <p style="font-size:14px;line-height:1.7;color:#374151;margin:0">${a.resumen||''}</p>
    </div>
    <div style="font-size:12px;color:#9CA3AF;margin-bottom:16px">${total} guiones analizados · ${crossed} cruzados con métricas de Meta</div>
    ${hooksHtml}
    ${temasHtml}
    ${estHtml}
    ${ctasHtml}
    ${proximosHtml}
    ${topPiezasHtml}`;
}

// Render de análisis guardados en formato viejo (compatibilidad)
function renderIAResultsLegacy(a, total, crossed, notionDates, metaDates, dateFrom, dateTo, extraLabel) {
  const periodoHtml = (dateFrom && dateTo)
    ? `<div style="background:var(--brand-light);border-radius:8px;padding:8px 14px;margin-bottom:12px;font-size:13px;color:var(--brand);font-weight:600">📅 ${dateFrom} → ${dateTo} ${extraLabel||''}</div>`
    : (extraLabel ? `<div style="background:var(--gray-100);border-radius:8px;padding:8px 14px;margin-bottom:12px;font-size:13px;color:var(--gray-500)">${extraLabel}</div>` : '');
  document.getElementById('ia-results').innerHTML = `
    ${periodoHtml}
    <div class="text-sm text-muted" style="margin-bottom:16px"><strong>${total}</strong> guiones · <strong>${crossed}</strong> cruzados</div>
    <div class="ai-summary"><p><strong>📋 Resumen</strong><br><br>${a.resumen_ejecutivo||a.resumen||''}</p></div>
    <div class="ai-grid">
      ${aiCard('✅ Patrones ganadores', a.patrones_ganadores, 'g')}
      ${aiCard('⚠️ Patrones débiles', a.patrones_debiles, 'r')}
    </div>
    <div class="card" style="margin-top:16px">
      <h3>🚀 Próximos guiones</h3>
      <div class="script-list">${(a.proximos_guiones||[]).map(g=>`
        <div class="script-item"><h4>${g.titulo}</h4>
        <p style="margin-top:6px;font-size:13px"><strong>Hook:</strong> ${g.hook}</p>
        <p style="margin-top:4px;font-size:12px;color:var(--gray-500)">${g.razon}</p></div>`).join('')}
      </div>
    </div>`;
}

function aiCard(title, items, color) {
  if (!items?.length) return `<div class="ai-card"><div class="ai-card-title">${title}</div><p style="color:var(--gray-500);font-size:13px">Sin datos</p></div>`;
  return `<div class="ai-card"><div class="ai-card-title">${title}</div>${items.map(item=>`
    <div style="margin-bottom:12px">
      <span class="tag tag-${color}">${item.patron}</span>
      <p style="margin-top:6px;font-size:13px">${item.descripcion}</p>
      ${item.ejemplos?.length?`<p style="margin-top:4px;font-size:12px;color:var(--gray-500)">Ej: ${item.ejemplos.join(' · ')}</p>`:''}
    </div>`).join('')}</div>`;
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.addEventListener('click', e => { if (e.target.classList.contains('overlay')) closeModal(e.target.id); });

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function N(n) { if (n === null || n === undefined || n === '') return '—'; return Number(n).toLocaleString('es-AR'); }
function fmtDate(d) { if (!d) return '—'; const [y,m,day] = d.split('-'); return `${day}/${m}/${y}`; }
function fmtTipo(tipo, badge = false) {
  if (!tipo) return badge ? '' : '—';
  const t = tipo.toLowerCase();
  let label, color;
  if (t.includes('reel') || t.includes('video')) {
    label = 'Video'; color = '#7C3AED'; bg = '#EDE9FE';
  } else if (t.includes('secuencia') || t.includes('carrusel') || t.includes('carousel')) {
    label = 'Carrusel'; color = '#0369A1'; bg = '#E0F2FE';
  } else if (t.includes('foto') || t.includes('image') || t.includes('imagen')) {
    label = 'Foto'; color = '#065F46'; bg = '#D1FAE5';
  } else {
    label = tipo; color = '#6B7280'; bg = '#F3F4F6';
  }
  if (badge) return `<span style="background:${bg};color:${color};font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap">${label}</span>`;
  return label;
}
