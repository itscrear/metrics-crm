<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content CRM — ItsCrear</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --brand: #7C3AED;
    --brand-light: #EDE9FE;
    --brand-dark: #5B21B6;
    --accent: #F59E0B;
    --success: #10B981;
    --danger: #EF4444;
    --gray-50: #F9FAFB;
    --gray-100: #F3F4F6;
    --gray-200: #E5E7EB;
    --gray-300: #D1D5DB;
    --gray-500: #6B7280;
    --gray-700: #374151;
    --gray-900: #111827;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--gray-50); color: var(--gray-900); }

  /* AUTH */
  #auth-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--brand-dark) 0%, var(--brand) 100%);
  }
  .auth-card {
    background: white; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .auth-logo { text-align: center; margin-bottom: 32px; }
  .auth-logo h1 { font-size: 28px; font-weight: 800; color: var(--brand); }
  .auth-logo p { color: var(--gray-500); margin-top: 4px; font-size: 14px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--gray-700); margin-bottom: 6px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 10px 14px; border: 1.5px solid var(--gray-200);
    border-radius: 8px; font-size: 14px; transition: border-color .2s;
    background: white; color: var(--gray-900);
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none; border-color: var(--brand);
  }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600;
    cursor: pointer; border: none; transition: all .2s;
  }
  .btn-primary { background: var(--brand); color: white; }
  .btn-primary:hover { background: var(--brand-dark); }
  .btn-secondary { background: var(--gray-100); color: var(--gray-700); }
  .btn-secondary:hover { background: var(--gray-200); }
  .btn-danger { background: var(--danger); color: white; }
  .btn-success { background: var(--success); color: white; }
  .btn-accent { background: var(--accent); color: white; }
  .btn-full { width: 100%; justify-content: center; }
  .btn-sm { padding: 6px 12px; font-size: 13px; }
  .error-msg { background: #FEE2E2; color: #B91C1C; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-top: 12px; }

  /* APP LAYOUT */
  #app { display: none; min-height: 100vh; }
  .topbar {
    background: white; border-bottom: 1px solid var(--gray-200);
    padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-brand { font-size: 18px; font-weight: 800; color: var(--brand); }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .user-badge {
    display: flex; align-items: center; gap: 8px;
    background: var(--brand-light); padding: 6px 12px; border-radius: 20px;
    font-size: 13px; font-weight: 600; color: var(--brand);
  }
  .role-badge {
    font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 700;
    background: var(--brand); color: white;
  }
  .main-container { max-width: 1200px; margin: 0 auto; padding: 24px; }

  /* ALERTS */
  .alert-banner {
    background: #FEF3C7; border: 1px solid #FCD34D; border-radius: 10px;
    padding: 14px 18px; margin-bottom: 20px;
  }
  .alert-banner h3 { font-size: 14px; font-weight: 700; color: #92400E; margin-bottom: 8px; }
  .alert-item { font-size: 13px; color: #78350F; padding: 3px 0; }

  /* CARDS */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .section-title { font-size: 20px; font-weight: 700; }
  .clients-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .client-card {
    background: white; border-radius: 12px; border: 1.5px solid var(--gray-200);
    padding: 20px; cursor: pointer; transition: all .2s;
  }
  .client-card:hover { border-color: var(--brand); box-shadow: 0 4px 20px rgba(124,58,237,.1); transform: translateY(-2px); }
  .client-name { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .client-meta { font-size: 13px; color: var(--gray-500); }
  .client-meta span { display: inline-block; margin-right: 12px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .status-active { background: var(--success); }
  .status-inactive { background: var(--gray-300); }
  .pieces-badge {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 11px; font-weight: 700; background: var(--brand-light); color: var(--brand);
    margin-top: 8px;
  }

  /* CLIENT DETAIL */
  #client-detail { display: none; }
  .back-btn { display: flex; align-items: center; gap: 6px; color: var(--gray-500); font-size: 14px; cursor: pointer; margin-bottom: 20px; }
  .back-btn:hover { color: var(--brand); }
  .client-header { background: white; border-radius: 12px; padding: 24px; margin-bottom: 20px; border: 1.5px solid var(--gray-200); }
  .client-header-top { display: flex; align-items: flex-start; justify-content: space-between; }
  .client-title { font-size: 24px; font-weight: 800; }
  .client-subtitle { color: var(--gray-500); font-size: 14px; margin-top: 4px; }
  .client-actions { display: flex; gap: 8px; }

  /* TABS */
  .tabs { display: flex; gap: 4px; background: var(--gray-100); padding: 4px; border-radius: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab {
    padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 600;
    cursor: pointer; color: var(--gray-500); transition: all .2s; border: none; background: transparent;
  }
  .tab.active { background: white; color: var(--brand); box-shadow: 0 1px 4px rgba(0,0,0,.1); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* KPI GRID */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .kpi-card { background: white; border-radius: 10px; padding: 16px; border: 1.5px solid var(--gray-200); }
  .kpi-label { font-size: 12px; color: var(--gray-500); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
  .kpi-value { font-size: 26px; font-weight: 800; color: var(--brand); margin-top: 4px; }
  .kpi-sub { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
  .kpi-trend { font-size: 12px; font-weight: 700; margin-top: 4px; }
  .trend-up { color: var(--success); }
  .trend-down { color: var(--danger); }

  /* TABLES */
  .table-wrap { background: white; border-radius: 12px; border: 1.5px solid var(--gray-200); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { background: var(--gray-50); padding: 12px 16px; text-align: left; font-size: 12px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--gray-200); }
  td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--gray-50); }
  .link-cell a { color: var(--brand); text-decoration: none; font-weight: 600; }
  .link-cell a:hover { text-decoration: underline; }

  /* CHART */
  .chart-wrap { background: white; border-radius: 12px; border: 1.5px solid var(--gray-200); padding: 20px; margin-bottom: 20px; }
  .chart-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; }

  /* MODALS */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
    z-index: 1000; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white; border-radius: 16px; padding: 32px; width: 100%; max-width: 560px;
    max-height: 90vh; overflow-y: auto; position: relative;
  }
  .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 24px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 24px; }
  .close-btn { position: absolute; top: 16px; right: 16px; cursor: pointer; color: var(--gray-500); font-size: 20px; border: none; background: none; }

  /* UPLOAD AREA */
  .upload-area {
    border: 2px dashed var(--gray-300); border-radius: 10px; padding: 32px;
    text-align: center; cursor: pointer; transition: all .2s;
  }
  .upload-area:hover, .upload-area.drag { border-color: var(--brand); background: var(--brand-light); }
  .upload-area p { color: var(--gray-500); font-size: 14px; }

  /* STAR */
  .star-btn { background: none; border: none; cursor: pointer; font-size: 20px; transition: transform .2s; }
  .star-btn:hover { transform: scale(1.2); }

  /* AI TAB */
  .ai-trigger-wrap { text-align: center; padding: 48px 24px; }
  .ai-trigger-wrap h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .ai-trigger-wrap p { color: var(--gray-500); font-size: 14px; margin-bottom: 24px; }
  .ai-cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; margin-top: 24px; }
  .ai-card { background: white; border-radius: 12px; border: 1.5px solid var(--gray-200); padding: 20px; }
  .ai-card-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .ai-card ul { padding-left: 16px; }
  .ai-card li { font-size: 13px; color: var(--gray-700); margin-bottom: 6px; line-height: 1.5; }
  .ai-card p { font-size: 13px; color: var(--gray-700); line-height: 1.6; }
  .ai-summary { background: var(--brand-light); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .ai-summary p { font-size: 14px; color: var(--brand-dark); line-height: 1.7; }
  .ai-tag { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; margin: 2px; }
  .ai-tag-green { background: #D1FAE5; color: #065F46; }
  .ai-tag-red { background: #FEE2E2; color: #991B1B; }
  .ai-tag-blue { background: #DBEAFE; color: #1E40AF; }
  .ai-tag-yellow { background: #FEF3C7; color: #92400E; }
  .ai-scripts-list { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }
  .ai-script-item { background: white; border: 1.5px solid var(--gray-200); border-radius: 10px; padding: 14px; }
  .ai-script-item h4 { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .ai-script-item p { font-size: 13px; color: var(--gray-500); }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-top-color: white; border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .progress-bar-wrap { background: var(--gray-200); border-radius: 10px; height: 6px; margin: 8px 0; }
  .progress-bar { background: var(--brand); height: 6px; border-radius: 10px; transition: width .3s; }
  .section-card { background: white; border-radius: 12px; border: 1.5px solid var(--gray-200); padding: 20px; margin-bottom: 16px; }

  /* PERIOD SELECTOR */
  .period-selector { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .period-chip {
    padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
    cursor: pointer; background: var(--gray-100); color: var(--gray-700); border: none;
    transition: all .2s;
  }
  .period-chip.active { background: var(--brand); color: white; }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 48px 24px; color: var(--gray-500); }
  .empty-state h3 { font-size: 16px; font-weight: 600; margin-bottom: 8px; }

  /* MISC */
  .flex { display: flex; }
  .gap-8 { gap: 8px; }
  .mt-16 { margin-top: 16px; }
  .text-sm { font-size: 13px; }
  .text-muted { color: var(--gray-500); }
  .divider { border: none; border-top: 1px solid var(--gray-200); margin: 16px 0; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .loading { text-align: center; padding: 32px; color: var(--gray-500); }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>✦ ItsCrear</h1>
      <p>Content CRM — Acceso de equipo</p>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="tu@email.com">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="auth-password" placeholder="••••••••">
    </div>
    <button class="btn btn-primary btn-full" onclick="login()">Iniciar sesión</button>
    <div id="auth-error"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">✦ ItsCrear CRM</div>
    <div class="topbar-right">
      <div class="user-badge">
        <span id="user-email-display"></span>
        <span class="role-badge" id="role-display"></span>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="logout()">Salir</button>
    </div>
  </div>

  <div class="main-container">
    <!-- ALERTS -->
    <div id="alerts-container"></div>

    <!-- DASHBOARD -->
    <div id="dashboard">
      <div class="section-header">
        <h2 class="section-title">Clientes</h2>
        <button class="btn btn-primary" id="add-client-btn" onclick="openAddClient()" style="display:none">+ Nuevo cliente</button>
      </div>
      <div class="clients-grid" id="clients-grid">
        <div class="loading">Cargando clientes...</div>
      </div>
    </div>

    <!-- CLIENT DETAIL -->
    <div id="client-detail">
      <div class="back-btn" onclick="showDashboard()">← Volver a clientes</div>
      <div class="client-header">
        <div class="client-header-top">
          <div>
            <div class="client-title" id="detail-name"></div>
            <div class="client-subtitle" id="detail-meta"></div>
          </div>
          <div class="client-actions" id="detail-actions"></div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('resumen')">📊 Resumen</button>
        <button class="tab" onclick="switchTab('historial')">📅 Historial</button>
        <button class="tab" onclick="switchTab('publicaciones')">📱 Publicaciones</button>
        <button class="tab" onclick="switchTab('estrellas')">⭐ Estrellas</button>
        <button class="tab" onclick="switchTab('ia')" id="tab-ia" style="display:none">✨ Análisis IA</button>
        <button class="tab" onclick="switchTab('cargar')" id="tab-cargar">+ Cargar métricas</button>
      </div>

      <div class="tab-content active" id="tab-resumen">
        <div id="resumen-content"><div class="loading">Cargando...</div></div>
      </div>
      <div class="tab-content" id="tab-historial">
        <div id="historial-content"><div class="loading">Cargando...</div></div>
      </div>
      <div class="tab-content" id="tab-publicaciones">
        <div id="publicaciones-content"><div class="loading">Cargando...</div></div>
      </div>
      <div class="tab-content" id="tab-estrellas">
        <div id="estrellas-content"><div class="loading">Cargando...</div></div>
      </div>
      <div class="tab-content" id="tab-ia">
        <div id="ia-content"></div>
      </div>
      <div class="tab-content" id="tab-cargar">
        <div id="cargar-content"></div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: Add/Edit Client -->
<div class="modal-overlay" id="modal-client">
  <div class="modal">
    <button class="close-btn" onclick="closeModal('modal-client')">✕</button>
    <div class="modal-title" id="modal-client-title">Nuevo cliente</div>
    <div class="grid-2">
      <div class="form-group">
        <label>Nombre del cliente *</label>
        <input type="text" id="c-name" placeholder="Ej: Mateo García">
      </div>
      <div class="form-group">
        <label>Instagram / Handle</label>
        <input type="text" id="c-handle" placeholder="@usuario">
      </div>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label>Nicho / Rubro</label>
        <input type="text" id="c-niche" placeholder="Ej: Fitness, Gastronomía">
      </div>
      <div class="form-group">
        <label>Piezas por mes</label>
        <select id="c-pieces">
          <option value="15">15 piezas / mes</option>
          <option value="20">20 piezas / mes</option>
          <option value="30">30 piezas / mes (quincenal)</option>
        </select>
      </div>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label>Fecha inicio de trabajo</label>
        <input type="date" id="c-start">
      </div>
      <div class="form-group">
        <label>Estado</label>
        <select id="c-active">
          <option value="true">Activo</option>
          <option value="false">Inactivo</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Notion Database ID <span class="text-muted">(para análisis IA)</span></label>
      <input type="text" id="c-notion-id" placeholder="29d5c1f273f281ebb8a0dee3dc5d6b81">
      <div class="text-sm text-muted mt-16" style="margin-top:6px">Encontralo en la URL de tu base de datos de Notion</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-client')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveClient()">Guardar cliente</button>
    </div>
  </div>
</div>

<!-- MODAL: Confirm Delete -->
<div class="modal-overlay" id="modal-confirm">
  <div class="modal" style="max-width:400px">
    <div class="modal-title">¿Estás segura?</div>
    <p class="text-sm" id="confirm-text"></p>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-confirm')">Cancelar</button>
      <button class="btn btn-danger" id="confirm-action-btn">Eliminar</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const SUPABASE_URL = 'https://qpvgvzjgcwosjwnblydz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwdmd2empnY3dvc2p3bmJseWR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNjI3NDIsImV4cCI6MjA4OTYzODc0Mn0.bBqUQV9OqF5-OwDyc_5agn3MMkYjUpWXa_i7hKaR5kY';
const NOTION_TOKEN = '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';
const CLAUDE_KEY = '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';
const NOTION_VERSION = '2022-06-28';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ============================================================
// STATE
// ============================================================
let currentUser = null;
let currentRole = null;
let currentClient = null;
let clients = [];
let currentPeriods = [];
let selectedPeriodId = null;
let editingClientId = null;
let evolutionChart = null;

// ============================================================
// AUTH
// ============================================================
async function login() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errEl = document.getElementById('auth-error');
  errEl.innerHTML = '';
  const { data, error } = await db.auth.signInWithPassword({ email, password });
  if (error) { errEl.innerHTML = `<div class="error-msg">${error.message}</div>`; return; }
  await initApp(data.user);
}

async function logout() {
  await db.auth.signOut();
  location.reload();
}

async function initApp(user) {
  currentUser = user;
  const { data: profile } = await db.from('profiles').select('role').eq('id', user.id).single();
  currentRole = profile?.role || 'editor';
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-email-display').textContent = user.email.split('@')[0];
  document.getElementById('role-display').textContent = currentRole === 'admin' ? 'Admin' : 'Editor';
  if (currentRole === 'admin') document.getElementById('add-client-btn').style.display = 'flex';
  await loadClients();
  await checkAlerts();
}

// Auto-login if session exists
window.addEventListener('DOMContentLoaded', async () => {
  const { data: { session } } = await db.auth.getSession();
  if (session?.user) await initApp(session.user);
});

// ============================================================
// CLIENTS
// ============================================================
async function loadClients() {
  const { data, error } = await db.from('clients').select('*').order('name');
  if (error) { console.error(error); return; }
  clients = data;
  renderClientsGrid();
}

function renderClientsGrid() {
  const grid = document.getElementById('clients-grid');
  if (!clients.length) {
    grid.innerHTML = '<div class="empty-state"><h3>No hay clientes todavía</h3><p>Hacé clic en "Nuevo cliente" para empezar</p></div>';
    return;
  }
  grid.innerHTML = clients.map(c => `
    <div class="client-card" onclick="openClient('${c.id}')">
      <div class="client-name">
        <span class="status-dot ${c.active ? 'status-active' : 'status-inactive'}"></span>${c.name}
      </div>
      <div class="client-meta">

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  const allTabs = document.querySelectorAll('.tab');
  const tabMap = { resumen: 0, historial: 1, publicaciones: 2, estrellas: 3, ia: 4, cargar: 5 };
  // Find by onclick
  document.querySelectorAll('.tab').forEach(t => {
    if (t.getAttribute('onclick') === `switchTab('${name}')`) t.classList.add('active');
  });
  document.getElementById(`tab-${name}`).classList.add('active');

  if (name === 'resumen') renderResumen();
  if (name === 'historial') renderHistorial();
  if (name === 'publicaciones') renderPublicaciones();
  if (name === 'estrellas') renderEstrellas();
  if (name === 'ia') renderIATab();
  if (name === 'cargar') renderCargarTab();
}

async function renderResumen() {
  const el = document.getElementById('resumen-content');
  if (!currentPeriods.length) {
    el.innerHTML = '<div class="empty-state"><h3>Sin métricas cargadas</h3><p>Usá el tab "+ Cargar métricas" para subir el primer período.</p></div>';
    return;
  }
  const latest = currentPeriods[0];
  const prev = currentPeriods[1];
  const { data: posts } = await db.from('posts').select('*').eq('period_id', latest.id).order('likes', { ascending: false });

  const trend = (curr, prev) => {
    if (!prev || prev === 0) return '';
    const d = ((curr - prev) / prev * 100).toFixed(1);
    return d > 0 ? `<span class="kpi-trend trend-up">▲ ${d}%</span>` : `<span class="kpi-trend trend-down">▼ ${Math.abs(d)}%</span>`;
  };

  el.innerHTML = `
    <div style="margin-bottom:12px;color:var(--gray-500);font-size:13px">Período: <strong>${latest.period_label}</strong></div>
    <div class="kpi-grid">
      ${kpiCard('Alcance', fmt(latest.reach), trend(latest.reach, prev?.reach))}
      ${kpiCard('Impresiones', fmt(latest.impressions), trend(latest.impressions, prev?.impressions))}
      ${kpiCard('Interacciones', fmt(latest.interactions), trend(latest.interactions, prev?.interactions))}
      ${kpiCard('Seguidores nuevos', fmt(latest.new_followers), trend(latest.new_followers, prev?.new_followers))}
      ${kpiCard('Guardados', fmt(latest.saves), trend(latest.saves, prev?.saves))}
      ${kpiCard('Compartidos', fmt(latest.shares), trend(latest.shares, prev?.shares))}
      ${kpiCard('Visitas perfil', fmt(latest.profile_visits), trend(latest.profile_visits, prev?.profile_visits))}
      ${kpiCard('Piezas', latest.total_posts || '—', '')}
    </div>
    ${posts?.length ? renderTopPostsResumen(posts.slice(0, 5)) : ''}
  `;
}

function kpiCard(label, value, trend = '') {
  return `<div class="kpi-card"><div class="kpi-label">${label}</div><div class="kpi-value">${value}</div>${trend}</div>`;
}

function renderTopPostsResumen(posts) {

// ALERTS
// ============================================================
async function checkAlerts() {
  const now = new Date();
  const alerts = [];
  for (const client of clients) {
    if (!client.active) continue;
    const startDate = new Date(client.start_date);
    if (startDate > now) continue;
    const { data: periods } = await db.from('metric_periods').select('period_label').eq('client_id', client.id);
    const labels = periods?.map(p => p.period_label.toLowerCase()) || [];
    const monthNames = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    if (client.pieces_per_month === 30) {
      const currMonth = monthNames[now.getMonth()];
      const currYear = now.getFullYear();
      const hasFH = labels.some(l => (l.includes('1-15') || l.includes('01-15') || l.includes('primera')) && l.includes(currMonth));
      const hasSH = labels.some(l => (l.includes('16-') || l.includes('segunda')) && l.includes(currMonth));
      if (!hasFH && now.getDate() >= 15) alerts.push(`⚠️ <strong>${client.name}</strong>: falta cargar la primera quincena de ${currMonth} ${currYear}`);
      if (!hasSH && now.getDate() >= 28) alerts.push(`⚠️ <strong>${client.name}</strong>: falta cargar la segunda quincena de ${currMonth} ${currYear}`);
    } else {
      if (now.getDate() >= 3) {
        const prevMonth = now.getMonth() === 0 ? 11 : now.getMonth() - 1;
        const prevYear = now.getMonth() === 0 ? now.getFullYear() - 1 : now.getFullYear();
        const prevName = monthNames[prevMonth];
        const hasPrev = labels.some(l => l.includes(prevName) && l.includes(String(prevYear)));
        if (!hasPrev) alerts.push(`⚠️ <strong>${client.name}</strong>: falta cargar las métricas de ${prevName} ${prevYear}`);
      }
    }
  }
  const container = document.getElementById('alerts-container');
  if (alerts.length) {
    container.innerHTML = `<div class="alert-banner"><h3>📋 Métricas pendientes</h3>${alerts.map(a => `<div class="alert-item">${a}</div>`).join('')}</div>`;
  }
}

        <p>Para usar el análisis IA, necesitás cargar el <strong>Notion Database ID</strong> del cliente.<br>
        Hacé clic en "Editar" y completá ese campo.</p>
        <button class="btn btn-secondary" onclick="openEditClient()">✏️ Editar cliente</button>
      </div>`;
    return;
  }
  el.innerHTML = `
    <div class="ai-trigger-wrap">
      <h3>✨ Análisis IA de contenido</h3>
      <p>Claude va a leer todos los guiones de Notion con estado "Subido",<br>cruzarlos con las métricas y detectar patrones de lo que funciona.</p>
      <button class="btn btn-primary" id="btn-run-ai" onclick="runAIAnalysis()">
        🚀 Analizar contenido con IA
      </button>
      <div id="ai-progress" style="margin-top:24px;display:none">
        <p id="ai-status-text" style="color:var(--gray-500);font-size:14px;margin-bottom:8px">Conectando con Notion...</p>

function setAIProgress(pct, text) {
  document.getElementById('ai-progress').style.display = 'block';
  document.getElementById('ai-progress-bar').style.width = pct + '%';
  document.getElementById('ai-status-text').textContent = text;
}

async function runAIAnalysis() {
  const btn = document.getElementById('btn-run-ai');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Analizando...';
  document.getElementById('ai-results').innerHTML = '';

  try {
    setAIProgress(10, 'Conectando con Notion...');
    const scripts = await fetchNotionScripts(currentClient.notion_database_id);
    if (!scripts.length) {
      document.getElementById('ai-results').innerHTML = '<div class="empty-state"><h3>No se encontraron guiones con estado "Subido" en Notion</h3></div>';
      btn.disabled = false; btn.innerHTML = '🚀 Analizar contenido con IA';
      return;
    }

    setAIProgress(40, `${scripts.length} guiones encontrados. Cruzando con métricas...`);
    const postsWithScripts = await crossScriptsWithPosts(scripts);

    setAIProgress(65, 'Enviando a Claude para análisis...');
    const analysis = await analyzeWithClaude(scripts, postsWithScripts);

    setAIProgress(95, 'Renderizando resultados...');
    renderAIAnalysis(analysis, scripts.length, postsWithScripts.length);
    setAIProgress(100, '¡Análisis completado!');

  } catch (err) {
    console.error(err);
    document.getElementById('ai-results').innerHTML = `<div class="error-msg">Error: ${err.message}</div>`;
  }
  btn.disabled = false;
  btn.innerHTML = '🔄 Volver a analizar';
}

async function fetchNotionScripts(databaseId) {
  // Clean database ID (remove dashes if any)
  const cleanId = databaseId.replace(/-/g, '');
  const formattedId = `${cleanId.slice(0,8)}-${cleanId.slice(8,12)}-${cleanId.slice(12,16)}-${cleanId.slice(16,20)}-${cleanId.slice(20)}`;

  const response = await fetch(`https://api.notion.com/v1/databases/${formattedId}/query`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${NOTION_TOKEN}`,
      'Content-Type': 'application/json',
      'Notion-Version': NOTION_VERSION,
    },
    body: JSON.stringify({
      filter: {
        property: 'Estado',
        status: { equals: 'Subido' }
      },
      page_size: 100
    })
  });

  if (!response.ok) {
    const err = await response.text();
    throw new Error(`Notion API error: ${response.status} — ${err}`);
  }

  const data = await response.json();
  return parseNotionScripts(data.results);
}

function parseNotionScripts(pages) {
  return pages.map(page => {
    const props = page.properties;
    const getName = (p) => {
      if (!p) return null;
      if (p.type === 'title') return p.title?.map(t => t.plain_text).join('') || null;
      if (p.type === 'rich_text') return p.rich_text?.map(t => t.plain_text).join('') || null;
      if (p.type === 'select') return p.select?.name || null;
      if (p.type === 'multi_select') return p.multi_select?.map(s => s.name).join(', ') || null;
      if (p.type === 'date') return p.date?.start || null;
      if (p.type === 'status') return p.status?.name || null;
      if (p.type === 'number') return p.number;
      return null;
    };

    // Find date property (Fecha subido or similar)
    let uploadDate = null;
    for (const key of Object.keys(props)) {
      if (key.toLowerCase().includes('fecha') || key.toLowerCase().includes('date') || key.toLowerCase().includes('subido')) {
        const val = getName(props[key]);
        if (val && val.match(/\d{4}-\d{2}-\d{2}/)) { uploadDate = val; break; }
      }
    }

    return {
      id: page.id,
      title: getName(props['Nombre'] || props['Title'] || props['Título'] || props[Object.keys(props).find(k => props[k].type === 'title')]) || 'Sin título',
      tema: getName(props['Tema'] || props['Ángulo'] || props['Angulo'] || props['Pilar']),
      estructura: getName(props['Estructura'] || props['Formato'] || props['Tipo']),
      cta: getName(props['CTA'] || props['Call to action']),
      hook: getName(props['Hook'] || props['Gancho']),
      pilar: getName(props['Pilar'] || props['Categoría'] || props['Categoria']),
      estado: getName(props['Estado']),
      upload_date: uploadDate,
      url: page.url,
    };
  });
}

async function crossScriptsWithPosts(scripts) {
  const { data: posts } = await db.from('posts').select('*').eq('client_id', currentClient.id);
  if (!posts?.length) return [];

  const postsByDate = {};
  posts.forEach(p => { if (p.post_date) postsByDate[p.post_date] = p; });

  return scripts.map(script => {
    const post = script.upload_date ? postsByDate[script.upload_date] : null;
    return { ...script, post };
  }).filter(s => s.post);
}

async function analyzeWithClaude(scripts, postsWithScripts) {
  const scriptsSummary = scripts.slice(0, 60).map(s =>
    `- Título: ${s.title} | Tema: ${s.tema || '?'} | Estructura: ${s.estructura || '?'} | Hook: ${s.hook || '?'} | CTA: ${s.cta || '?'} | Pilar: ${s.pilar || '?'}`
  ).join('\n');

  const crossedSummary = postsWithScripts.slice(0, 30).map(s =>
    `- "${s.title}" → Likes: ${s.post?.likes || 0}, Guardados: ${s.post?.saves || 0}, Alcance: ${s.post?.reach || 0} | Tema: ${s.tema || '?'} | Estructura: ${s.estructura || '?'} | Hook: ${s.hook || '?'}`
  ).join('\n');

  const prompt = `Sos analista experto en contenido de redes sociales para la agencia ItsCrear. Analizá los guiones y métricas del cliente "${currentClient.name}" y devolvé un análisis estratégico en JSON.

GUIONES TOTALES (${scripts.length}):
${scriptsSummary}

GUIONES CON MÉTRICAS CRUZADAS (${postsWithScripts.length} piezas con datos de performance):
${crossedSummary}

Devolvé SOLAMENTE un JSON válido con esta estructura exacta:
{
  "resumen_ejecutivo": "párrafo de 3-4 líneas con el estado general del contenido y los hallazgos más importantes",
  "patrones_ganadores": [
    {"patron": "nombre del patrón", "descripcion": "por qué funciona", "ejemplos": ["título1", "título2"]}
  ],
  "patrones_debiles": [
    {"patron": "nombre del patrón", "descripcion": "por qué no funciona o genera menos engagement", "ejemplos": ["título1"]}
  ],
  "analisis_ganchos": {
    "mejor_estilo": "descripción del tipo de hook que más funciona",
    "peor_estilo": "descripción del tipo de hook que menos funciona",
    "recomendacion": "consejo accionable sobre hooks"
  },
  "analisis_ctas": {
    "patron_dominante": "qué CTAs se usan más",
    "recomendacion": "cómo mejorar los CTAs"
  },
  "recomendaciones": [
    "recomendación estratégica 1",
    "recomendación estratégica 2",
    "recomendación estratégica 3"
  ],
  "proximos_guiones": [
    {"titulo": "título sugerido", "tema": "tema", "estructura": "formato", "hook": "hook sugerido", "razon": "por qué va a funcionar"}
  ]
}`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': CLAUDE_KEY,
      'anthropic-version': '2023-06-01',
      'content-type': 'application/json',
      'anthropic-dangerous-allow-browser': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 4000,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!res.ok) {
    const errText = await res.text();
    throw new Error(`Claude API error: ${res.status} — ${errText}`);
  }

  const data = await res.json();
  const text = data.content[0].text;
  const jsonMatch = text.match(/\{[\s\S]*\}/);
  if (!jsonMatch) throw new Error('Claude no devolvió JSON válido');
  return JSON.parse(jsonMatch[0]);
}

function renderAICard(title, items, color) {
  if (!items?.length) return `<div class="ai-card"><div class="ai-card-title">${title}</div><p class="text-muted">Sin datos suficientes</p></div>`;
  return `
    <div class="ai-card">
      <div class="ai-card-title">${title}</div>
      ${items.map(item => `
        <div style="margin-bottom:12px">
          <strong class="ai-tag ai-tag-${color}">${item.patron}</strong>
          <p style="margin-top:6px;font-size:13px;color:var(--gray-700)">${item.descripcion}</p>
          ${item.ejemplos?.length ? `<p style="margin-top:4px;font-size:12px;color:var(--gray-500)">Ej: ${item.ejemplos.join(' · ')}</p>` : ''}
        </div>
      `).join('')}
    </div>`;
}
